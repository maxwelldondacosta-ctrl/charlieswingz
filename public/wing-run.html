<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Charlie's Wingz — Wing Run</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  body { margin: 0; background: #0d0d1a; overflow: hidden; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #game-container { border: 4px solid #e53935; border-radius: 12px; box-shadow: 0 0 40px rgba(229, 57, 53, 0.2); overflow: hidden; }
  .ui-overlay { position: fixed; inset: 0; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  .panel { background: rgba(26, 26, 46, 0.95); border: 2px solid #e53935; border-radius: 12px; padding: 40px; width: 360px; color: #fff; text-align: center; pointer-events: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
  h2 { color: #e53935; margin-bottom: 20px; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
  input { width: 100%; padding: 12px; margin: 8px 0; background: #05050a; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 1rem; outline: none; }
  input:focus { border-color: #e53935; }
  button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; transition: transform 0.1s; }
  button:active { transform: scale(0.98); }
  .btn-primary { background: linear-gradient(135deg, #e53935, #b71c1c); color: #fff; }
  .btn-secondary { background: transparent; border: 1px solid #444; color: #888; font-size: 0.9rem; }
  .hidden { display: none !important; }
  #nav { position: fixed; bottom: 20px; color: #e53935; font-size: 0.9rem; text-decoration: none; font-weight: 600; opacity: 0.6; transition: opacity 0.2s; }
  #nav:hover { opacity: 1; }
</style>
</head>
<body>

<div id="game-container"></div>

<div class="ui-overlay" id="overlay">
  <!-- Login -->
  <div class="panel" id="pLogin">
    <div style="font-size:4rem;margin-bottom:10px;">🚴</div>
    <h2>Wing Run</h2>
    <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="btn-primary" onclick="doLogin()">Start Shift</button>
    <button class="btn-secondary" onclick="showPanel('register')">Create Account</button>
    <button class="btn-secondary" style="margin-top:20px; border:none" onclick="closeOverlay()">Play as Guest</button>
  </div>
  <!-- Register -->
  <div class="panel hidden" id="pRegister">
    <div style="font-size:4rem;margin-bottom:10px;">🚴</div>
    <h2>Join the Fleet</h2>
    <input id="regName" type="text" placeholder="Name">
    <input id="regEmail" type="email" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <button class="btn-primary" onclick="doRegister()">Join & Play</button>
    <button class="btn-secondary" onclick="showPanel('login')">← Back to Login</button>
  </div>
</div>

<a id="nav" href="/play-win">← BACK TO ARCADE</a>

<script>
// ── Auth & API ────────────────────────────────────────────────────────────────
const API = {
  token: null, user: null,
  async login(email, pw) {
    const r = await fetch('/api/game/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    this.token = d.token; this.user = d.user;
    localStorage.setItem('cw_session', JSON.stringify({token:this.token, user:this.user}));
  },
  async register(name, email, pw) {
    const r = await fetch('/api/game/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pw})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Registration failed');
    this.token = d.token; this.user = d.user;
    localStorage.setItem('cw_session', JSON.stringify({token:this.token, user:this.user}));
  },
  async save(score, coins, deliveries) {
    if (!this.token) return;
    await fetch('/api/game/save',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${this.token}`},body:JSON.stringify({score,coins,deliveries})}).catch(()=>{});
  },
};

function showPanel(name) {
  document.getElementById('pLogin').classList.add('hidden');
  document.getElementById('pRegister').classList.add('hidden');
  if (name === 'login') document.getElementById('pLogin').classList.remove('hidden');
  if (name === 'register') document.getElementById('pRegister').classList.remove('hidden');
}

async function doLogin() {
  try {
    await API.login(document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
    closeOverlay();
  } catch(e) { alert(e.message); }
}

async function doRegister() {
  try {
    await API.register(document.getElementById('regName').value, document.getElementById('regEmail').value, document.getElementById('regPass').value);
    closeOverlay();
  } catch(e) { alert(e.message); }
}

function closeOverlay() {
  document.getElementById('overlay').classList.add('hidden');
  if (gameInstance) gameInstance.scene.getAt(0).startGame();
}

// ── Phaser Engine ─────────────────────────────────────────────────────────────
class WingRun extends Phaser.Scene {
  constructor() { super('WingRun'); }

  preload() {
    this.load.image('bg-road', '/game-assets/shooter/bg-tile.png');
    this.load.svg('bike', '/game-assets/vector/scooter.svg', { width: 64, height: 64 });
    this.load.svg('car1', '/game-assets/vector/car.svg', { width: 64, height: 64 });
    this.load.svg('car2', '/game-assets/vector/truck.svg', { width: 64, height: 64 });
    this.load.svg('shop', '/game-assets/vector/shop.svg', { width: 128, height: 128 });
    this.load.svg('house', '/game-assets/vector/house.svg', { width: 128, height: 128 });
    
    // SFX
    this.load.audio('deliver', '/sfx/wr-deliver.mp3');
    this.load.audio('crash', '/sfx/wr-crash.mp3');
    this.load.audio('hop', '/sfx/wr-hop.mp3');
  }

  create() {
    this.W = 400;
    this.H = 700;
    this.initGame();
  }

  initGame() {
    // Parallax scrolling backgrounds
    this.road = this.add.tileSprite(200, 350, 400, 700, 'bg-road');

    // Player
    this.player = this.physics.add.sprite(200, 600, 'bike').setCollideWorldBounds(true);
    this.player.setDepth(20);

    // Groups
    this.cars = this.physics.add.group();
    this.houses = this.physics.add.group();
    this.dropZones = this.physics.add.group();

    // Stats
    this.score = 0;
    this.deliveries = 0;
    this.coins = 0;
    this.gameActive = false;
    this.speed = 400;
    this.hopping = false;
    this.heat = 100;

    // UI
    this.scoreText = this.add.text(10, 10, 'SCORE: 0', { fontSize: '18px', fontWeight: 'bold', fill: '#fdd835' }).setDepth(100);
    this.delText = this.add.text(10, 35, 'DELIVERIES: 0', { fontSize: '14px', fill: '#fff' }).setDepth(100);
    
    // Heat Bar
    this.add.text(10, 650, 'HEAT', { fontSize: '12px', fill: '#fff' }).setDepth(100);
    this.heatBarBg = this.add.graphics().setDepth(100);
    this.heatBarBg.fillStyle(0x222222, 1);
    this.heatBarBg.fillRoundedRect(50, 650, 300, 15, 6);
    
    this.heatBar = this.add.graphics().setDepth(100);

    // Input
    this.cursors = this.input.keyboard.createCursorKeys();
    this.spaceBar = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    // Collisions
    this.physics.add.overlap(this.player, this.cars, this.hitCar, null, this);
    this.physics.add.overlap(this.player, this.dropZones, this.makeDelivery, null, this);

    // Spawners
    this.carTimer = this.time.addEvent({ delay: 1000, callback: this.spawnCar, callbackScope: this, loop: true, paused: true });
    this.houseTimer = this.time.addEvent({ delay: 2000, callback: this.spawnHouse, callbackScope: this, loop: true, paused: true });
  }

  startGame() {
    this.gameActive = true;
    this.score = 0;
    this.deliveries = 0;
    this.coins = 0;
    this.speed = 400;
    this.heat = 100;
    this.hopping = false;
    this.player.setPosition(200, 600);
    this.player.setAlpha(1);
    this.player.clearTint();
    
    this.cars.clear(true, true);
    this.houses.clear(true, true);
    this.dropZones.clear(true, true);
    
    this.scoreText.setText('SCORE: 0');
    this.delText.setText('DELIVERIES: 0');
    this.carTimer.paused = false;
    this.houseTimer.paused = false;
    this.physics.resume();
  }

  update(time, delta) {
    if (!this.gameActive) return;

    // Scrolling
    this.road.tilePositionY -= (this.speed * 0.001) * delta;

    // Movement
    if (this.cursors.left.isDown) {
        this.player.setVelocityX(-350);
        this.player.setAngle(-15);
    } else if (this.cursors.right.isDown) {
        this.player.setVelocityX(350);
        this.player.setAngle(15);
    } else {
        this.player.setVelocityX(0);
        this.player.setAngle(0);
    }

    if (this.cursors.up.isDown) this.player.setVelocityY(-250);
    else if (this.cursors.down.isDown) this.player.setVelocityY(250);
    else this.player.setVelocityY(0);

    // Hop mechanics
    if (Phaser.Input.Keyboard.JustDown(this.spaceBar) && !this.hopping && this.heat >= 20) {
        this.hopping = true;
        this.heat -= 20;
        this.sound.play('hop', { volume: 0.5 });
        this.tweens.add({
            targets: this.player,
            scale: 1.5,
            duration: 250,
            yoyo: true,
            onComplete: () => { this.hopping = false; }
        });
    }

    // Heat
    this.heat -= delta * 0.01;
    if (this.heat <= 0) this.gameOver();
    
    this.drawHeatBar();

    // Clean up
    this.cars.children.each(c => { if (c.y > 800) c.destroy(); });
    this.houses.children.each(h => { if (h.y > 800) h.destroy(); });
    this.dropZones.children.each(d => { if (d.y > 800) d.destroy(); });
  }

  drawHeatBar() {
    this.heatBar.clear();
    const pct = Math.max(0, this.heat / 100);
    const color = pct > 0.5 ? 0x4caf50 : pct > 0.2 ? 0xff9800 : 0xe53935;
    if (pct > 0) {
        this.heatBar.fillStyle(color, 1);
        this.heatBar.fillRoundedRect(50, 650, 300 * pct, 15, 6);
    }
  }

  spawnCar() {
    if (!this.gameActive) return;
    const laneX = [100, 200, 300][Phaser.Math.Between(0, 2)];
    const type = Phaser.Math.Between(1, 2);
    const car = this.cars.create(laneX, -100, `car${type}`);
    car.setDepth(15);
    car.setVelocityY(this.speed * 0.4);
  }

  spawnHouse() {
    if (!this.gameActive) return;
    const isLeft = Math.random() > 0.5;
    const x = isLeft ? 40 : 360;
    const type = Math.random() > 0.8 ? 'shop' : 'house';
    const h = this.houses.create(x, -150, type);
    h.setDepth(10);
    h.setVelocityY(this.speed);

    // Drop zone
    const zoneX = isLeft ? 120 : 280;
    const zone = this.dropZones.create(zoneX, -150, null);
    zone.setSize(80, 80);
    this.physics.world.enable(zone);
    zone.body.allowGravity = false;
    zone.setVelocityY(this.speed);

    const graphics = this.add.graphics().setDepth(5);
    graphics.lineStyle(4, 0x4caf50, 0.8);
    graphics.strokeCircle(0, 0, 40);
    zone.graphics = graphics;
    
    zone.update = function() {
        if (this.graphics) this.graphics.setPosition(this.x, this.y);
    };
    this.events.on('update', zone.update, zone);
  }

  makeDelivery(player, zone) {
    zone.destroy();
    if (zone.graphics) zone.graphics.destroy();
    
    this.deliveries++;
    this.score += 50;
    this.heat = Math.min(100, this.heat + 30);
    
    if (this.deliveries % 5 === 0) {
        this.speed += 50;
        this.coins += Phaser.Math.Between(10, 20);
    }
    
    this.scoreText.setText('SCORE: ' + this.score);
    this.delText.setText('DELIVERIES: ' + this.deliveries);
    this.sound.play('deliver', { volume: 0.6 });

    const txt = this.add.text(player.x, player.y - 40, '+DELIVERY', { fontSize: '20px', fill: '#4caf50', fontWeight: 'bold' }).setOrigin(0.5).setDepth(30);
    this.tweens.add({ targets: txt, y: txt.y - 50, alpha: 0, duration: 800, onComplete: () => txt.destroy() });
  }

  hitCar(player, car) {
    if (this.hopping) return;

    this.gameActive = false;
    this.physics.pause();
    this.player.setTint(0xff0000);
    this.sound.play('crash', { volume: 0.8 });
    this.cameras.main.shake(300, 0.05);

    setTimeout(() => { this.gameOver(); }, 1000);
  }

  gameOver() {
    this.gameActive = false;
    this.carTimer.paused = true;
    this.houseTimer.paused = true;
    
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('pLogin').classList.add('hidden');
    document.getElementById('pRegister').classList.add('hidden');
    
    let goPanel = document.getElementById('gameOverPanel');
    if (!goPanel) {
        goPanel = document.createElement('div');
        goPanel.id = 'gameOverPanel';
        goPanel.className = 'panel';
        document.getElementById('overlay').appendChild(goPanel);
    }
    goPanel.classList.remove('hidden');
    goPanel.innerHTML = `
        <div style="font-size:4rem;margin-bottom:10px;">💥</div>
        <h2 style="color:#e53935">Shift Over</h2>
        <p>Score: <strong style="color:#fdd835;font-size:1.5rem">${this.score}</strong></p>
        <p style="margin-bottom:20px;color:#aaa">Deliveries: ${this.deliveries} | Coins Earned: ${this.coins}</p>
        <button class="btn-primary" onclick="startGameCustom()">Start New Shift</button>
        <button class="btn-secondary" onclick="window.location.href='/play-win'">Back to Arcade</button>
    `;
    
    API.save(this.score, this.coins, this.deliveries);
  }
}

const config = {
  type: Phaser.AUTO,
  width: 400,
  height: 700,
  parent: 'game-container',
  physics: { default: 'arcade', arcade: { debug: false } },
  scene: WingRun,
  antialias: true
};

let gameInstance = new Phaser.Game(config);

function startGameCustom() {
    document.getElementById('overlay').classList.add('hidden');
    const goPanel = document.getElementById('gameOverPanel');
    if (goPanel) goPanel.classList.add('hidden');
    if (gameInstance) gameInstance.scene.getAt(0).startGame();
}

// Restore session
const s = JSON.parse(localStorage.getItem('cw_session') || 'null');
if (s && s.token) {
  API.token = s.token; API.user = s.user;
  document.getElementById('overlay').classList.add('hidden');
}
</script>
</body>
</html>
