const DLS=[{col:2,row:0},{col:7,row:0},{col:2,row:1},{col:7,row:1},{col:0,row:2},{col:9,row:2},{col:0,row:5},{col:9,row:5},{col:3,row:2},{col:6,row:2},{col:4,row:8},{col:8,row:8},{col:2,row:9},{col:7,row:9},{col:2,row:13},{col:7,row:13}];
const BNS=[{label:"Free Dip",icon:"\uD83E\uDED9",code:"FREEDIP"},{label:"+2 Wings",icon:"\uD83C\uDF57",code:"PLUS2"},{label:"\u00A32 Off",icon:"\uD83D\uDCB7",code:"2OFF"}];
function cW(x,y){const r=30;for(const[px,py] of [[x-r,y-r],[x+r,y-r],[x-r,y+r],[x+r,y+r]]){const c=Math.floor(px/TILE),rw=Math.floor(py/TILE);if(c<0||c>=COLS||rw<0||rw>=ROWS)return false;}return true;}
function tSpd(x,y){const c=Math.floor(x/TILE),r=Math.floor(y/TILE);if(c<0||c>=COLS||r<0||r>=ROWS)return OFF_ROAD_SPD;return WALK.has(MAP[r][c])?1.0:OFF_ROAD_SPD;}
function isRd(c,r){if(c<0||c>=COLS||r<0||r>=ROWS)return false;return WALK.has(MAP[r][c]);}
function pD(n){return[...DLS].sort(()=>Math.random()-0.5).slice(0,n).map(d=>({...d,done:false}));}
function pDWithVIP(n,rnd){
  const dels=[...DLS].sort(()=>Math.random()-0.5).slice(0,n).map(d=>({...d,done:false,vip:false}));
  // one VIP delivery from round 2 onwards
  if(rnd>=2&&dels.length>0){const vipIdx=Math.floor(Math.random()*dels.length);dels[vipIdx].vip=true;}
  return dels;
}
function spawnPUs(rnd){
  const count=Math.min(1+Math.floor(rnd/2),3);
  const puList=[];
  const roadCells=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(WALK.has(MAP[r][c])&&MAP[r][c]!==11&&MAP[r][c]!==12)roadCells.push({r,c});
  const shuffled=roadCells.sort(()=>Math.random()-0.5);
  for(let i=0;i<Math.min(count,shuffled.length);i++){
    const cell=shuffled[i];
    puList.push({x:cell.c*TILE+TILE/2,y:cell.r*TILE+TILE/2,type:Math.floor(Math.random()*4),collected:false});}
  return puList;
}
function mC(n,rnd){const hrs=[0,2,5,8,11,13],vcs=[2,7];const c=[];const spdBoost=Math.min((rnd||1)-1,10)*0.22;for(let i=0;i<n;i++){
  const carSpd=0.6+spdBoost+Math.random()*(1.8+spdBoost);
  if(i<4){c.push({hz:true,row:hrs[i%hrs.length],pos:Math.random()*W,spd:(i%2===0?1:-1)*carSpd,ci:i%4,vis:true});}
  else{const col=vcs[i%vcs.length];const lane=(i%2===0)?-1:1;
    c.push({hz:false,col,lane,pos:Math.random()*H,spd:(i%2===0?1:-1)*carSpd,ci:i%4,vis:true});}}return c;}
function aP(g,x,y,c,n){for(let i=0;i<n;i++)g.parts.push({x,y,vx:(Math.random()-0.5)*300,vy:(Math.random()-0.5)*300,life:0.6,ml:0.6,c});}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

const API={
  token:null, user:null,
  async login(email,password){
    const res=await fetch('/api/game/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();if(!res.ok)throw new Error(data.message||'Login failed');
    this.token=data.token;this.user=data.user;return data;
  },
  async register(name,email,password){
    const res=await fetch('/api/game/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})});
    const data=await res.json();if(!res.ok)throw new Error(data.message||'Registration failed');
    this.token=data.token;this.user=data.user;return data;
  },
  async getProgress(){
    const res=await fetch('/api/game/progress?_='+Date.now(),{headers:{'Authorization':`Bearer ${this.token}`},cache:'no-store'});
    if(!res.ok)throw new Error('Failed to load progress');return await res.json();
  },
  async saveGame(score,deliveries,bonus){
    const res=await fetch('/api/game/save',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${this.token}`},body:JSON.stringify({score,deliveries,bonus})});
    if(!res.ok)throw new Error('Failed to save');return await res.json();
  },

};

function saveSession(){try{localStorage.setItem('cw_session',JSON.stringify({token:API.token,user:API.user}));}catch(e){}}
function clearSession(){try{localStorage.removeItem('cw_session');}catch(e){}}
function loadSession(){try{return JSON.parse(localStorage.getItem('cw_session')||'null');}catch(e){return null;}}

function App(){
  const[scr,setScr]=useState("loading");
  const[usr,setUsr]=useState(null);
  const[progress,setProgress]=useState(null);
  const[res,setRes]=useState(null);
  const[err,setErr]=useState("");

  // Auto-login on mount
  useEffect(()=>{
    (async()=>{
      const session=loadSession();
      if(session&&session.token){
        try{
          API.token=session.token;API.user=session.user;
          const prog=await API.getProgress();
          setUsr(API.user);setProgress(prog);setScr("home");
        }catch(e){clearSession();API.token=null;API.user=null;setScr("login");}
      }else{setScr("login");}
    })();
  },[]);

  const onLogin=async(email,pass)=>{
    try{
      await API.login(email,pass);saveSession();
      const prog=await API.getProgress();
      setUsr(API.user);setProgress(prog);setErr("");setScr("home");
    }catch(e){throw e;}
  };
  const onRegister=async(name,email,pass)=>{
    try{
      await API.register(name,email,pass);saveSession();
      const prog=await API.getProgress();
      setUsr(API.user);setProgress(prog);setErr("");setScr("home");
    }catch(e){throw e;}
  };
  const endG=async(r)=>{
    try{
      const updated=await API.saveGame(r.score,r.deliveries,r.bonus||null);
      setProgress(updated);
    }catch(e){console.error("Save failed:",e);}
    setRes(r);setScr("result");
  };

  const logout=()=>{clearSession();API.token=null;API.user=null;setUsr(null);setProgress(null);setScr("login");};

  if(scr==="loading")return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100dvh",background:"#111",color:"#7f8c9a"}}>Loading...</div>);

  return(<div style={{background:"#111",minHeight:"100dvh",color:"#eee",fontFamily:"'Segoe UI',-apple-system,sans-serif",overflow:"hidden",touchAction:"none",userSelect:"none",WebkitUserSelect:"none"}}>

      <span style={{color:"#ff9800"}}>{usr?.name||"PLAYER"}</span>
      <div style={{display:"flex",gap:14}}>
        <span style={{color:"#7f8c9a"}}>⭐ {(progress?.highScore||0).toLocaleString()}</span>
        <span style={{color:"#7f8c9a"}}>🎮 {(progress?.plays||0)}</span>
      </div>
    </div>}
    {scr==="login"&&<LG onLogin={onLogin} onRegister={onRegister}/>}
    {scr==="home"&&<HM2 u={usr} p={progress} onPlay={()=>setScr("game")} onOut={logout}/>}
    {scr==="game"&&<GV onEnd={endG}/>}
    {scr==="result"&&<RS r={res} p={progress} onHome={()=>setScr("home")} onAgain={()=>setScr("game")}/>}
  </div>);
}

      im.current.mc=mc;}
    const loop=()=>{if(!run)return;if(!gs.current){raf.current=requestAnimationFrame(loop);return;}
      const g=gs.current,now=performance.now(),dt=Math.min((now-g.lastT)/1000,0.05);g.lastT=now;
      if(!ended.current){
        g.timer-=dt;if(g.timer<=0){g.timer=0;fin();}
        // Hop logic
        if(g.hop.active){g.hop.t+=dt;const p=Math.min(g.hop.t/HOP_DUR,1);
          g.px=g.hop.sx+(g.hop.tx-g.hop.sx)*p;g.py=g.hop.sy+(g.hop.ty-g.hop.sy)*p;

    {/* Mobile HOP button */}
    <div className="touch-zones hop-btn" style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",zIndex:30}}>
      <button onTouchStart={(e)=>{e.preventDefault();e.stopPropagation();hopRef.current=true;}}
        style={{width:80,height:80,borderRadius:"50%",background:"rgba(41,182,246,0.3)",border:"3px solid rgba(41,182,246,0.7)",
        color:"#29b6f6",fontSize:16,fontWeight:900,cursor:"pointer",touchAction:"none",userSelect:"none",WebkitUserSelect:"none",
        display:"flex",alignItems:"center",justifyContent:"center",letterSpacing:2}}>HOP</button>
    </div>
    {/* D-pad for desktop only */}
    <div className="desktop-dpad"><DPD onChange={(x,y)=>{dpd.current={x,y};}}/></div>
    <div style={{textAlign:"center",fontSize:11,color:"#555",marginTop:4,padding:"0 10px"}} className="touch-hint">Tap screen corners to steer · HOP to jump over cars</div>
  </div>);
}

function DPD({onChange}){
  const ar=useRef(new Set());
  const up=()=>{let x=0,y=0;if(ar.current.has("u"))y-=1;if(ar.current.has("d"))y+=1;if(ar.current.has("l"))x-=1;if(ar.current.has("r"))x+=1;onChange(x,y);};
  const pr=d=>{ar.current.add(d);up();};const rl=d=>{ar.current.delete(d);up();};
  useEffect(()=>{const h=()=>{ar.current.clear();up();};document.addEventListener("touchcancel",h);return()=>document.removeEventListener("touchcancel",h);},[]);
  const B=({dir,children,gridArea})=>{const[p,sP]=useState(false);
    return(<div style={{gridArea,width:48,height:48,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,
      background:p?"rgba(255,152,0,0.3)":"rgba(255,255,255,0.07)",border:p?"2px solid rgba(255,152,0,0.6)":"1px solid rgba(255,255,255,0.1)",
      color:p?"#ff9800":"#fff",cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",transition:"background 0.05s"}}
      onTouchStart={e=>{e.preventDefault();e.stopPropagation();sP(true);pr(dir);}}
      onTouchEnd={e=>{e.preventDefault();e.stopPropagation();sP(false);rl(dir);}}
      onTouchCancel={()=>{sP(false);rl(dir);}}
      onMouseDown={e=>{e.preventDefault();sP(true);pr(dir);}}
      onMouseUp={()=>{sP(false);rl(dir);}}
      onMouseLeave={()=>{if(p){sP(false);rl(dir);}}}
      onContextMenu={e=>e.preventDefault()}>{children}</div>);};
  return(<div style={{marginTop:6,display:"grid",gridTemplateAreas:'". up ." "left center right" ". down ."',gridTemplateColumns:"48px 48px 48px",gridTemplateRows:"48px 48px 48px",gap:3,touchAction:"none"}}>
    <B dir="u" gridArea="up">{"\u25B2"}</B><B dir="l" gridArea="left">{"\u25C0"}</B>
    <div style={{gridArea:"center",width:48,height:48,borderRadius:12,background:"rgba(255,255,255,0.03)"}}/>
    <B dir="r" gridArea="right">{"\u25B6"}</B><B dir="d" gridArea="down">{"\u25BC"}</B></div>);
}

function RS({r,p,onHome,onAgain}){
  const[sh,setSh]=useState(false);useEffect(()=>{setTimeout(()=>setSh(true),300);},[]);
  const cs={background:"#16213e",borderRadius:14,padding:18,border:"1px solid #233554"};
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100dvh",padding:20}}>
    <div style={{maxWidth:380,width:"100%",textAlign:"center"}}>
      <div style={{fontSize:52,marginBottom:4}}>{"🍗"}</div>
      <h2 style={{fontSize:24,fontWeight:900,color:"#ff9800",margin:"0 0 20px",letterSpacing:2}}>SHIFT OVER</h2>
      <div style={{...cs,marginBottom:14}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,textAlign:"center"}}>
        <div><div style={{fontSize:28,fontWeight:900,color:"#fdd835"}}>{"\u2605"} {r.score}</div><div style={{fontSize:10,color:"#7f8c9a",textTransform:"uppercase"}}>Score</div></div>
        <div><div style={{fontSize:28,fontWeight:900,color:"#4caf50"}}>{r.deliveries}</div><div style={{fontSize:10,color:"#7f8c9a",textTransform:"uppercase"}}>Deliveries</div></div></div></div>

      {r.bonus&&<div style={{...cs,marginBottom:14,border:"2px solid #4caf5066"}}>
        <div style={{fontSize:11,color:"#4caf50",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>BONUS!</div>
        <div style={{fontSize:28}}>{r.bonus.icon}</div><div style={{fontSize:16,fontWeight:800}}>{r.bonus.label}</div>
        <div style={{fontSize:12,color:"#ff9800",fontFamily:"monospace",marginTop:4}}>Code: {r.bonus.code}</div></div>}
      <button onClick={onAgain} style={{width:"100%",padding:"15px 0",fontSize:17,fontWeight:900,background:"#ff9800",color:"#000",border:"none",borderRadius:10,cursor:"pointer",marginBottom:10,letterSpacing:2}}>{"🚴 PLAY AGAIN"}</button>
      <button onClick={onHome} style={{width:"100%",padding:"13px 0",fontSize:14,fontWeight:600,background:"transparent",color:"#7f8c9a",border:"1px solid #233554",borderRadius:10,cursor:"pointer"}}>{"\u2190 HOME"}</button>
    </div></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
