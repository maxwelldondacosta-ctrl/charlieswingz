<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Sauce Shooter – Charlie's Wingz Arcade</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
  #game-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  .overlay-panel { background: rgba(13, 13, 26, 0.95); border: 2px solid #e8a838; border-radius: 16px; padding: 40px; text-align: center; pointer-events: auto; max-width: 400px; width: 90%; box-shadow: 0 0 30px rgba(232, 168, 56, 0.2); }
  h1 { color: #e8a838; font-size: 2.5rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
  p { color: #aaa; margin-bottom: 24px; font-size: 1rem; }
  .auth-box { margin-bottom: 24px; }
  input { width: 100%; padding: 12px; margin-bottom: 12px; background: #05050a; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 1rem; outline: none; }
  input:focus { border-color: #e8a838; }
  button { background: #e8a838; color: #000; border: none; padding: 14px 32px; font-weight: 800; border-radius: 8px; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; transition: transform 0.1s; width: 100%; }
  button:active { transform: scale(0.98); }
  .guest-btn { background: transparent; border: 1px solid #444; color: #888; margin-top: 12px; font-size: 0.8rem; padding: 8px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="game-container"></div>

<div class="ui-overlay" id="ui-overlay">
  <!-- Start Screen -->
  <div class="overlay-panel" id="start-screen">
    <div style="font-size:4rem;margin-bottom:10px;">🛸</div>
    <h1>Sauce Shooter</h1>
    <p>Defend the shop! Blast the rival vans with high-velocity sauce bolts.</p>
    
    <div id="auth-section">
      <div class="auth-box">
        <input type="email" id="email" placeholder="Email" autocomplete="email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login to Save Score</button>
      </div>
      <button class="guest-btn" onclick="startGame()">Play as Guest</button>
    </div>

    <div id="welcome-section" class="hidden">
      <p>Welcome back, <strong id="player-name" style="color:#fff"></strong>!</p>
      <button onclick="startGame()">Start Mission</button>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay-panel hidden" id="game-over-screen">
    <h1>Mission Failed</h1>
    <p>Rival vans breached the perimeter.<br>Final Score: <strong id="final-score" style="color:#e8a838; font-size:1.5rem">0</strong></p>
    <button onclick="startGame()">Retry Mission</button>
    <a href="/play-win" style="display:block; margin-top:20px; color:#666; text-decoration:none; font-size:0.9rem;">Back to Arcade</a>
  </div>
</div>

<script>
// ── Auth & API Logic ──────────────────────────────────────────────────────────
const API = {
  token: localStorage.getItem('cw_game_token'),
  async login(email, password) {
    const res = await fetch('/api/game/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const d = await res.json();
    if (!res.ok) throw new Error(d.message);
    this.token = d.token;
    localStorage.setItem('cw_game_token', d.token);
    return d;
  },
  async saveGame(score) {
    if (!this.token) return;
    return fetch('/api/game/save', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` }, body: JSON.stringify({ score }) });
  }
};

async function handleLogin() {
  const e = document.getElementById('email').value, p = document.getElementById('password').value;
  try {
    const d = await API.login(e, p);
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('welcome-section').classList.remove('hidden');
    document.getElementById('player-name').textContent = d.user.name || d.user.id;
  } catch (err) { alert(err.message); }
}

function startGame() {
  document.getElementById('ui-overlay').classList.add('hidden');
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  if (gameInstance && gameInstance.scene.getAt(0)) {
    gameInstance.scene.getAt(0).startGame();
  }
}

function removeBackground(img){
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=img.width; canvas.height=img.height;
  ctx.drawImage(img,0,0);
  const data=ctx.getImageData(0,0,canvas.width,canvas.height);
  const pixels=data.data;
  // Use top-left pixel as reference for background
  const r=pixels[0], g=pixels[1], b=pixels[2];
  for(let i=0; i<pixels.length; i+=4){
    const dr=Math.abs(pixels[i]-r), dg=Math.abs(pixels[i+1]-g), db=Math.abs(pixels[i+2]-b);
    if(dr<25 && dg<25 && db<25) pixels[i+3]=0;
  }
  ctx.putImageData(data,0,0);
  const newImg=new Image();
  newImg.src=canvas.toDataURL();
  return newImg;
}

function loadImgWithTransparentBg(scene, key, src) {
  const img = new Image();
  img.crossOrigin = "Anonymous";
  img.onload = () => {
    if (key === 'bg') {
        scene.textures.addImage(key, img);
        if (scene.onAssetLoaded) scene.onAssetLoaded();
    } else {
        const transparentImg = removeBackground(img);
        transparentImg.onload = () => {
            scene.textures.addImage(key, transparentImg);
            if (scene.onAssetLoaded) scene.onAssetLoaded();
        };
    }
  };
  img.onerror = () => {
    console.error('Failed to load asset:', key, src);
    if (scene.onAssetLoaded) scene.onAssetLoaded();
  };
  img.src = src;
}

// ── Phaser Game Engine ────────────────────────────────────────────────────────
class SauceShooter extends Phaser.Scene {
  constructor() { super('SauceShooter'); }

  preload() {
    this.assetsToLoad = 8;
    this.assetsLoaded = 0;
    this.onAssetLoaded = () => {
      this.assetsLoaded++;
      if (this.assetsLoaded === this.assetsToLoad) {
        this.assetsReady = true;
      }
    };

    loadImgWithTransparentBg(this, 'bg', '/game-assets/shooter/bg-tile.png');
    loadImgWithTransparentBg(this, 'player', '/game-assets/shooter/player-ship.png');
    loadImgWithTransparentBg(this, 'enemy1', '/game-assets/shooter/enemy-van-1.png');
    loadImgWithTransparentBg(this, 'enemy2', '/game-assets/shooter/enemy-van-2.png');
    loadImgWithTransparentBg(this, 'bullet', '/game-assets/shooter/bullet-sauce.png');
    loadImgWithTransparentBg(this, 'pu_shield', '/game-assets/shooter/powerup-shield.png');
    loadImgWithTransparentBg(this, 'pu_rapid', '/game-assets/shooter/powerup-rapid.png');
    loadImgWithTransparentBg(this, 'explosion', '/game-assets/shooter/explosion.png');
  }

  create() {
    this.W = 400;
    this.H = 600;

    this.waitForAssets = this.time.addEvent({
      delay: 100,
      loop: true,
      callback: () => {
        if (this.assetsReady) {
          this.waitForAssets.destroy();
          this.initGame();
        }
      }
    });
  }

  initGame() {
    // Scrolling Background
    this.bg = this.add.tileSprite(200, 300, 400, 600, 'bg');

    // Player
    this.player = this.physics.add.sprite(200, 520, 'player').setCollideWorldBounds(true);
    this.player.setScale(0.15).setDepth(10);
    
    // Groups
    this.bullets = this.physics.add.group();
    this.enemies = this.physics.add.group();
    this.powerups = this.physics.add.group();

    // Stats
    this.score = 0;
    this.lives = 3;
    this.isGameOver = false;
    this.lastFired = 0;
    this.rapidFire = 0;
    this.shieldActive = 0;
    this.gameActive = false;

    // UI
    this.scoreText = this.add.text(16, 16, 'SCORE: 0', { fontSize: '20px', fontWeight: '900', fill: '#e8a838', fontFamily: 'monospace' }).setDepth(100);
    this.livesText = this.add.text(300, 16, 'LIVES: 3', { fontSize: '20px', fontWeight: '900', fill: '#ff5252', fontFamily: 'monospace' }).setDepth(100);

    // Collisions
    this.physics.add.overlap(this.bullets, this.enemies, this.hitEnemy, null, this);
    this.physics.add.overlap(this.player, this.enemies, this.hitPlayer, null, this);
    this.physics.add.overlap(this.player, this.powerups, this.getPowerup, null, this);

    // Input
    this.cursors = this.input.keyboard.createCursorKeys();
    this.fireKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    // Shield Circle (Visual)
    this.shieldGraphic = this.add.graphics();
    this.shieldGraphic.lineStyle(3, 0xe8a838, 0.8);
    this.shieldGraphic.strokeCircle(0, 0, 40);
    this.shieldGraphic.setVisible(false);

    // Spawning
    this.spawnTimer = this.time.addEvent({ delay: 600, callback: this.spawnEnemy, callbackScope: this, loop: true, paused: true });
  }

  startGame() {
    this.gameActive = true;
    this.isGameOver = false;
    this.score = 0;
    this.lives = 3;
    this.scoreText.setText('SCORE: 0');
    this.livesText.setText('LIVES: 3');
    this.player.setPosition(200, 520);
    this.player.setAlpha(1);
    this.player.clearTint();
    this.enemies.clear(true, true);
    this.bullets.clear(true, true);
    this.powerups.clear(true, true);
    this.spawnTimer.paused = false;
    this.physics.resume();
  }

  update(time, delta) {
    if (!this.gameActive || this.isGameOver) return;

    this.bg.tilePositionY -= 2;

    // Movement
    if (this.cursors.left.isDown) this.player.setVelocityX(-350);
    else if (this.cursors.right.isDown) this.player.setVelocityX(350);
    else this.player.setVelocityX(0);

    // Shooting
    if (this.fireKey.isDown && time > this.lastFired) {
      this.fireBullet();
      this.lastFired = time + (this.rapidFire > 0 ? 150 : 450);
    }

    // Powerup Timers
    if (this.rapidFire > 0) this.rapidFire -= delta;
    if (this.shieldActive > 0) {
      this.shieldActive -= delta;
      this.shieldGraphic.setVisible(true);
      this.shieldGraphic.setPosition(this.player.x, this.player.y);
    } else {
      this.shieldGraphic.setVisible(false);
    }

    // Clean up bullets
    this.bullets.children.each(b => { if (b.active && b.y < -50) b.destroy(); });
    // Clean up enemies
    this.enemies.children.each(e => { if (e.active && e.y > 650) e.destroy(); });
  }

  fireBullet() {
    const b = this.bullets.create(this.player.x, this.player.y - 20, 'bullet');
    if (b) {
      b.setActive(true).setVisible(true).setScale(0.1).setDepth(5);
      b.body.velocity.y = -600;
    }
  }

  spawnEnemy() {
    if (this.isGameOver) return;
    const type = Phaser.Math.Between(1, 2);
    const x = Phaser.Math.Between(50, 350);
    const e = this.enemies.create(x, -50, `enemy${type}`);
    e.setScale(0.15).setDepth(8);
    // Increased base speed and faster scaling
    e.body.velocity.y = 250 + (this.score / 100);
  }

  hitEnemy(bullet, enemy) {
    this.explode(enemy.x, enemy.y);
    bullet.destroy();
    enemy.destroy();
    this.score += 100;
    this.scoreText.setText('SCORE: ' + this.score);

    if (Phaser.Math.Between(1, 40) === 1) this.spawnPowerup(enemy.x, enemy.y);
  }

  spawnPowerup(x, y) {
    const type = Math.random() > 0.5 ? 'shield' : 'rapid';
    const p = this.powerups.create(x, y, `pu_${type}`);
    p.setScale(0.12).setDepth(9);
    p.body.velocity.y = 100;
    p.setData('type', type);
  }

  getPowerup(player, pu) {
    const type = pu.getData('type');
    if (type === 'shield') this.shieldActive = 8000;
    else this.rapidFire = 5000;
    pu.destroy();
  }

  hitPlayer(player, enemy) {
    if (this.shieldActive > 0) {
      this.shieldActive = 0;
      this.explode(enemy.x, enemy.y);
      enemy.destroy();
      return;
    }

    this.explode(player.x, player.y);
    enemy.destroy();
    this.lives--;
    this.livesText.setText('LIVES: ' + this.lives);

    // Camera shake
    this.cameras.main.shake(200, 0.02);

    if (this.lives <= 0) this.gameOver();
  }

  explode(x, y) {
    const ex = this.add.image(x, y, 'explosion').setScale(0.1).setDepth(20);
    this.tweens.add({ targets: ex, scale: 0.3, alpha: 0, duration: 300, onComplete: () => ex.destroy() });
  }

  gameOver() {
    this.isGameOver = true;
    this.physics.pause();
    this.player.setTint(0xff0000);
    this.spawnTimer?.destroy();
    document.getElementById('ui-overlay').classList.remove('hidden');
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('final-score').textContent = this.score;
    API.saveGame(this.score);
  }
}

const config = {
  type: Phaser.AUTO,
  width: 400,
  height: 600,
  parent: 'game-container',
  physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
  scene: [SauceShooter],
  pixelArt: false, // Smooth rendering for high-res assets
  antialias: true
};

let gameInstance = new Phaser.Game(config);

// Restore session on load
(async () => {
  if (API.token) {
    try {
      const res = await fetch('/api/game/progress', { headers: { 'Authorization': `Bearer ${API.token}` } });
      const d = await res.json();
      if (res.ok) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('welcome-section').classList.remove('hidden');
        document.getElementById('player-name').textContent = d.user?.name || d.totalScore + ' pts';
      }
    } catch (e) {}
  }
})();
</script>
</body>
</html>
