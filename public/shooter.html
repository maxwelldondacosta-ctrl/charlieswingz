<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Sauce Shooter – Charlie's Wingz Arcade</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
  #game-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  .overlay-panel { background: rgba(13, 13, 26, 0.95); border: 2px solid #e8a838; border-radius: 16px; padding: 40px; text-align: center; pointer-events: auto; max-width: 400px; width: 90%; box-shadow: 0 0 30px rgba(232, 168, 56, 0.2); }
  h1 { color: #e8a838; font-size: 2.5rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
  p { color: #aaa; margin-bottom: 24px; font-size: 1rem; }
  .auth-box { margin-bottom: 24px; }
  input { width: 100%; padding: 12px; margin-bottom: 12px; background: #05050a; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 1rem; outline: none; }
  input:focus { border-color: #e8a838; }
  button { background: #e8a838; color: #000; border: none; padding: 14px 32px; font-weight: 800; border-radius: 8px; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; transition: transform 0.1s; width: 100%; }
  button:active { transform: scale(0.98); }
  .guest-btn { background: transparent; border: 1px solid #444; color: #888; margin-top: 12px; font-size: 0.8rem; padding: 8px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="game-container"></div>

<div class="ui-overlay hidden" id="ui-overlay">
  <!-- Start Screen -->
  <div class="overlay-panel" id="start-screen">
    <div style="font-size:4rem;margin-bottom:10px;">🛸</div>
    <h1>Sauce Shooter</h1>
    <p>Defend the shop! Blast the rival vans with high-velocity sauce bolts.</p>
    
    <div id="auth-section">
      <div class="auth-box">
        <input type="email" id="email" placeholder="Email" autocomplete="email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login to Save Score</button>
      </div>
      <button class="guest-btn" onclick="startGame()">Play as Guest</button>
    </div>

    <div id="welcome-section" class="hidden">
      <p>Welcome back, <strong id="player-name" style="color:#fff"></strong>!</p>
      <button onclick="startGame()">Start Mission</button>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay-panel hidden" id="game-over-screen">
    <h1>Mission Failed</h1>
    <p>Rival vans breached the perimeter.<br>Final Score: <strong id="final-score" style="color:#e8a838; font-size:1.5rem">0</strong></p>
    <button onclick="startGame()">Retry Mission</button>
    <a href="/play-win" style="display:block; margin-top:20px; color:#666; text-decoration:none; font-size:0.9rem;">Back to Arcade</a>
  </div>
</div>

<script>
// ── Auth & API Logic ──────────────────────────────────────────────────────────
const _sess = JSON.parse(localStorage.getItem('cw_session') || 'null');
const API = {
  token: _sess ? _sess.token : null,
  user:  _sess ? _sess.user  : null,
  async login(email, password) {
    const res = await fetch('/api/game/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error || d.message || 'Login failed');
    this.token = d.token; this.user = d.user;
    localStorage.setItem('cw_session', JSON.stringify({ token: d.token, user: d.user }));
    return d;
  },
  async saveGame(score) {
    if (!this.token) return;
    return fetch('/api/game/save', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` }, body: JSON.stringify({ score }) });
  }
};

async function handleLogin() {
  const e = document.getElementById('email').value, p = document.getElementById('password').value;
  try {
    const d = await API.login(e, p);
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('welcome-section').classList.remove('hidden');
    document.getElementById('player-name').textContent = d.user.name || d.user.id;
  } catch (err) { alert(err.message); }
}

function startGame() {
  document.getElementById('ui-overlay').classList.add('hidden');
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  if (gameInstance && gameInstance.scene.getAt(0)) {
    gameInstance.scene.getAt(0).startGame();
  }
}

// ── Phaser Game Engine ────────────────────────────────────────────────────────
class SauceShooter extends Phaser.Scene {
  constructor() { super('SauceShooter'); }

  preload() {
    this.load.audio('shoot', '/sfx/ss-shoot.mp3');
    this.load.audio('boom', '/sfx/ss-explosion.mp3');
    this.load.audio('hit', '/sfx/ss-hit.mp3');
    this.load.audio('powerup', '/sfx/ss-powerup.mp3');
    this.load.audio('gameover', '/sfx/ss-gameover.mp3');
  }

  mk(key, w, h, fn) {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    fn(g); g.generateTexture(key, w, h); g.destroy();
  }

  createTextures() {
    // CW Wings Spaceship — Charlie's Wingz logo as a proper fighter craft
    this.mk('player', 72, 80, g => {
      // Engine glow
      g.fillStyle(0x44aaff); g.fillEllipse(36, 78, 24, 10);
      g.fillStyle(0x88ccff); g.fillEllipse(36, 76, 12, 6);
      // Left wing
      g.fillStyle(0xe8a838);
      g.fillTriangle(0, 64, 28, 32, 18, 72);
      g.fillStyle(0xb07820); g.fillRect(2, 52, 18, 4); // wing stripe
      // Right wing
      g.fillStyle(0xe8a838);
      g.fillTriangle(72, 64, 44, 32, 54, 72);
      g.fillStyle(0xb07820); g.fillRect(52, 52, 18, 4);
      // Fuselage body
      g.fillStyle(0xe8a838); g.fillRoundedRect(22, 4, 28, 68, 8);
      g.fillStyle(0xb07820); g.fillRoundedRect(26, 8, 20, 56, 6);
      // Cockpit canopy
      g.fillStyle(0x001833); g.fillEllipse(36, 28, 20, 26);
      g.fillStyle(0x1166bb); g.fillEllipse(36, 27, 13, 18);
      g.fillStyle(0x55aaee); g.fillEllipse(34, 24, 6, 9);
      // Wing cannon barrels
      g.fillStyle(0x888888);
      g.fillRect(0, 62, 10, 14); g.fillRect(62, 62, 10, 14);
      g.fillStyle(0x444444); g.fillRect(3, 60, 4, 16); g.fillRect(65, 60, 4, 16);
      // CW logo on fuselage
      g.fillStyle(0x0d0d1a);
      g.fillRect(25, 44, 3, 12); g.fillRect(25, 44, 10, 3); g.fillRect(25, 56, 10, 3); // C
      g.fillRect(38, 44, 3, 12); g.fillRect(44, 44, 3, 12); g.fillRect(41, 50, 3, 6); // W
    });

    // "Clucky's" — red bucket UFO (KFC parody)
    this.mk('enemy1', 64, 56, g => {
      // Saucer body
      g.fillStyle(0xcc1a1a); g.fillEllipse(32, 36, 62, 30);
      g.fillStyle(0xee3333); g.fillEllipse(32, 34, 48, 18);
      // Bucket dome on top
      g.fillStyle(0xcc1a1a); g.fillRoundedRect(18, 10, 28, 26, 4);
      // Red & white stripes
      g.fillStyle(0xffffff); g.fillRect(18, 15, 28, 5); g.fillRect(18, 27, 28, 5);
      // Little face (colonel parody)
      g.fillStyle(0xffddcc); g.fillCircle(32, 22, 6);
      g.fillStyle(0x222222); g.fillCircle(30, 21, 1.5); g.fillCircle(34, 21, 1.5);
      g.fillStyle(0xffffff); g.fillRect(29, 25, 6, 2); // moustache
      // Engine glow
      g.fillStyle(0xff6666); g.fillEllipse(32, 46, 28, 8);
    });

    // "McWings" — golden arches UFO (McDonald's parody)
    this.mk('enemy2', 64, 56, g => {
      // Saucer
      g.fillStyle(0xdd9900); g.fillEllipse(32, 36, 62, 30);
      g.fillStyle(0xffcc00); g.fillEllipse(32, 34, 48, 18);
      // Yellow dome
      g.fillStyle(0xffaa00); g.fillRoundedRect(16, 8, 32, 28, 10);
      // Big M arches in red
      g.fillStyle(0xcc1111);
      g.fillRect(18, 12, 5, 16);   // left post
      g.fillRect(41, 12, 5, 16);   // right post
      g.fillRect(29, 12, 6, 16);   // center post
      g.fillTriangle(18, 12, 23, 22, 29, 12); // left arch
      g.fillTriangle(29, 12, 35, 22, 41, 12); // right arch
      // Engine glow
      g.fillStyle(0xffee44); g.fillEllipse(32, 46, 28, 8);
    });

    // "Flamingo's" — orange flame-bird UFO (Nando's parody)
    this.mk('enemy3', 64, 56, g => {
      // Saucer
      g.fillStyle(0xcc4400); g.fillEllipse(32, 36, 62, 30);
      g.fillStyle(0xff6600); g.fillEllipse(32, 34, 48, 18);
      // Dome
      g.fillStyle(0xee5500); g.fillRoundedRect(16, 6, 32, 30, 8);
      // Rooster/flame silhouette
      g.fillStyle(0xffaa00); g.fillEllipse(32, 20, 14, 16); // body
      g.fillStyle(0xff3300); // flame comb
      g.fillTriangle(26, 8, 30, 2, 32, 10);
      g.fillTriangle(30, 6, 34, 0, 36, 8);
      g.fillTriangle(34, 8, 38, 3, 40, 10);
      g.fillStyle(0xff9900); g.fillTriangle(38, 18, 46, 20, 38, 26); // beak/wing
      g.fillStyle(0x111111); g.fillCircle(36, 17, 2.5); // eye
      // Engine glow
      g.fillStyle(0xff8833); g.fillEllipse(32, 46, 28, 8);
    });
    // Sauce drop bullet
    this.mk('bullet', 14, 22, g => {
      g.fillStyle(0xff6600); g.fillEllipse(7, 8, 12, 12);
      g.fillStyle(0xff9944); g.fillEllipse(7, 7, 6, 6);
      g.fillStyle(0xff6600); g.fillTriangle(3, 12, 11, 12, 7, 20);
    });
    // Explosion burst
    this.mk('explosion', 64, 64, g => {
      const cx = 32, cy = 32;
      g.fillStyle(0xff8800);
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        g.fillTriangle(cx, cy, cx+Math.cos(a-0.35)*16, cy+Math.sin(a-0.35)*16, cx+Math.cos(a)*28, cy+Math.sin(a)*28);
        g.fillTriangle(cx, cy, cx+Math.cos(a+0.35)*16, cy+Math.sin(a+0.35)*16, cx+Math.cos(a)*28, cy+Math.sin(a)*28);
      }
      g.fillStyle(0xffcc00); g.fillCircle(cx, cy, 13);
      g.fillStyle(0xffffff); g.fillCircle(cx, cy, 6);
    });
    // Shield powerup (blue)
    this.mk('pu_shield', 36, 36, g => {
      g.fillStyle(0x2266ff);
      g.fillTriangle(18, 2, 34, 12, 34, 26); g.fillTriangle(18, 2, 2, 12, 2, 26);
      g.fillRect(2, 24, 32, 6); g.fillTriangle(2, 30, 34, 30, 18, 36);
      g.fillStyle(0x88aaff); g.fillCircle(18, 18, 9);
      g.fillStyle(0xffffff); g.fillRect(16, 11, 4, 14); g.fillRect(11, 17, 14, 4);
    });
    // Rapid fire powerup (gold lightning)
    this.mk('pu_rapid', 36, 36, g => {
      g.fillStyle(0xffee00);
      g.fillTriangle(24, 2, 12, 20, 20, 20);
      g.fillTriangle(16, 16, 28, 16, 16, 34);
      g.fillStyle(0xffffff); g.fillCircle(20, 18, 3);
    });
  }

  create() {
    this.W = 400;
    this.H = 600;
    this.createTextures();
    this.initGame();
  }

  initGame() {
    // Dark background
    this.add.rectangle(200, 300, 400, 600, 0x0d0d1a);
    this.bg = this.add.graphics();

    // Player
    this.player = this.physics.add.sprite(200, 520, 'player').setCollideWorldBounds(true).setScale(0.4);
    this.player.setDepth(10);
    
    // Groups
    this.bullets = this.physics.add.group();
    this.enemies = this.physics.add.group();
    this.powerups = this.physics.add.group();

    // Stats
    this.score = 0;
    this.lives = 3;
    this.isGameOver = false;
    this.lastFired = 0;
    this.rapidFire = 0;
    this.shieldActive = 0;
    this.gameActive = false;

    // UI
    this.scoreText = this.add.text(16, 16, 'SCORE: 0', { fontSize: '20px', fontWeight: '900', fill: '#e8a838', fontFamily: 'monospace' }).setDepth(100);
    this.livesText = this.add.text(300, 16, 'LIVES: 3', { fontSize: '20px', fontWeight: '900', fill: '#ff5252', fontFamily: 'monospace' }).setDepth(100);

    // Collisions
    this.physics.add.overlap(this.bullets, this.enemies, this.hitEnemy, null, this);
    this.physics.add.overlap(this.player, this.enemies, this.hitPlayer, null, this);
    this.physics.add.overlap(this.player, this.powerups, this.getPowerup, null, this);

    // Input
    this.cursors = this.input.keyboard.createCursorKeys();
    this.fireKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    // Shield Circle (Visual)
    this.shieldGraphic = this.add.graphics();
    this.shieldGraphic.lineStyle(3, 0xe8a838, 0.8);
    this.shieldGraphic.strokeCircle(0, 0, 40);
    this.shieldGraphic.setVisible(false);

    // Spawning
    this.spawnTimer = this.time.addEvent({ delay: 600, callback: this.spawnEnemy, callbackScope: this, loop: true, paused: true });

    // If session already restored (overlay hidden before scene ready), auto-start
    if (document.getElementById('ui-overlay').classList.contains('hidden')) {
      this.time.delayedCall(50, () => this.startGame());
    }
  }

  startGame() {
    this.gameActive = true;
    this.isGameOver = false;
    this.score = 0;
    this.lives = 3;
    this.scoreText.setText('SCORE: 0');
    this.livesText.setText('LIVES: 3');
    this.player.setPosition(200, 520);
    this.player.setAlpha(1);
    this.player.clearTint();
    this.enemies.clear(true, true);
    this.bullets.clear(true, true);
    this.powerups.clear(true, true);
    this.spawnTimer.paused = false;
    this.physics.resume();
  }

  update(time, delta) {
    if (!this.gameActive || this.isGameOver) return;

    // bg is now a plain graphics object, no tilePositionY needed

    // Movement
    if (this.cursors.left.isDown) this.player.setVelocityX(-350);
    else if (this.cursors.right.isDown) this.player.setVelocityX(350);
    else this.player.setVelocityX(0);

    // Shooting
    if (this.fireKey.isDown && time > this.lastFired) {
      this.fireBullet();
      this.lastFired = time + (this.rapidFire > 0 ? 150 : 450);
    }

    // Powerup Timers
    if (this.rapidFire > 0) this.rapidFire -= delta;
    if (this.shieldActive > 0) {
      this.shieldActive -= delta;
      this.shieldGraphic.setVisible(true);
      this.shieldGraphic.setPosition(this.player.x, this.player.y);
    } else {
      this.shieldGraphic.setVisible(false);
    }

    // Clean up bullets
    this.bullets.children.each(b => { if (b.active && b.y < -50) b.destroy(); });
    // Clean up enemies
    this.enemies.children.each(e => { if (e.active && e.y > 650) e.destroy(); });
  }

  fireBullet() {
    const b = this.bullets.create(this.player.x, this.player.y - 20, 'bullet');
    if (b) {
      b.setActive(true).setVisible(true).setDepth(5).setScale(0.3);
      b.body.velocity.y = -600;
      this.sound.play('shoot', { volume: 0.3 });
    }
  }

  spawnEnemy() {
    if (this.isGameOver) return;
    const type = Phaser.Math.Between(1, 3);
    const x = Phaser.Math.Between(40, 360);
    const e = this.enemies.create(x, -60, `enemy${type}`);
    e.setDepth(8);
    e.body.velocity.y = 250 + (this.score / 100);
    // Slow wobble
    this.tweens.add({ targets: e, x: e.x + Phaser.Math.Between(-30, 30), duration: 1200, yoyo: true, loop: -1, ease: 'Sine.easeInOut' });
  }

  hitEnemy(bullet, enemy) {
    this.explode(enemy.x, enemy.y);
    this.sound.play('boom', { volume: 0.5 });
    bullet.destroy();
    enemy.destroy();
    this.score += 100;
    this.scoreText.setText('SCORE: ' + this.score);

    if (Phaser.Math.Between(1, 40) === 1) this.spawnPowerup(enemy.x, enemy.y);
  }

  spawnPowerup(x, y) {
    const type = Math.random() > 0.5 ? 'shield' : 'rapid';
    const p = this.powerups.create(x, y, `pu_${type}`);
    p.setDepth(9);
    p.body.velocity.y = 100;
    p.setData('type', type);
  }

  getPowerup(player, pu) {
    const type = pu.getData('type');
    if (type === 'shield') this.shieldActive = 8000;
    else this.rapidFire = 5000;
    this.sound.play('powerup', { volume: 0.5 });
    pu.destroy();
  }

  hitPlayer(player, enemy) {
    if (this.shieldActive > 0) {
      this.shieldActive = 0;
      this.explode(enemy.x, enemy.y);
      enemy.destroy();
      return;
    }

    this.explode(player.x, player.y);
    enemy.destroy();
    this.lives--;
    this.livesText.setText('LIVES: ' + this.lives);

    // Camera shake
    this.cameras.main.shake(200, 0.02);
    this.sound.play('hit', { volume: 0.6 });

    if (this.lives <= 0) this.gameOver();
  }

  explode(x, y) {
    const ex = this.add.image(x, y, 'explosion').setDepth(20);
    this.tweens.add({ targets: ex, scale: 1.5, alpha: 0, duration: 300, onComplete: () => ex.destroy() });
  }

  gameOver() {
    this.isGameOver = true;
    this.physics.pause();
    this.sound.play('gameover', { volume: 0.7 });
    this.player.setTint(0xff0000);
    this.spawnTimer?.destroy();
    document.getElementById('ui-overlay').classList.remove('hidden');
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('final-score').textContent = this.score;
    API.saveGame(this.score);
  }
}

const config = {
  type: Phaser.AUTO,
  width: 400,
  height: 600,
  parent: 'game-container',
  physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
  scene: [SauceShooter],
  antialias: true
};

let gameInstance = new Phaser.Game(config);

// Restore session — overlay starts hidden; show it only if no valid session
if (API.token) {
  // overlay stays hidden, create() will auto-start
} else {
  document.getElementById('ui-overlay').classList.remove('hidden');
}
</script>
</body>
</html>
