<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Wing King – Charlie's Wingz Arcade</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  body { margin: 0; background: #0d0d1a; overflow: hidden; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #game-container { border: 4px solid #e8a838; border-radius: 12px; box-shadow: 0 0 40px rgba(232, 168, 56, 0.2); overflow: hidden; }
  .ui-overlay { position: fixed; inset: 0; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  .panel { background: rgba(26, 26, 46, 0.95); border: 2px solid #ff9800; border-radius: 12px; padding: 40px; width: 360px; color: #fff; text-align: center; pointer-events: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
  h2 { color: #ff9800; margin-bottom: 20px; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
  input { width: 100%; padding: 12px; margin: 8px 0; background: #05050a; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 1rem; outline: none; }
  input:focus { border-color: #ff9800; }
  button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; transition: transform 0.1s; }
  button:active { transform: scale(0.98); }
  .btn-primary { background: #ff9800; color: #000; }
  .btn-secondary { background: transparent; border: 1px solid #444; color: #888; font-size: 0.9rem; }
  .hidden { display: none !important; }
  #nav { position: fixed; bottom: 20px; color: #ff9800; font-size: 0.9rem; text-decoration: none; font-weight: 600; opacity: 0.6; transition: opacity 0.2s; }
  #nav:hover { opacity: 1; }
</style>
</head>
<body>

<div id="game-container"></div>

<div class="ui-overlay hidden" id="overlay">
  <!-- Login -->
  <div class="panel" id="pLogin">
    <h2>Wing King</h2>
    <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="btn-primary" onclick="doLogin()">Start Mission</button>
    <button class="btn-secondary" onclick="showPanel('register')">Create Account</button>
    <button class="btn-secondary" style="margin-top:20px; border:none" onclick="closeOverlay()">Play as Guest</button>
  </div>
  <!-- Register -->
  <div class="panel hidden" id="pRegister">
    <h2>Join the Flight</h2>
    <input id="regName" type="text" placeholder="Name">
    <input id="regEmail" type="email" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <button class="btn-primary" onclick="doRegister()">Join & Play</button>
    <button class="btn-secondary" onclick="showPanel('login')">← Back to Login</button>
  </div>
</div>

<a id="nav" href="/play-win">← BACK TO ARCADE</a>

<script>
// ── Auth & API ────────────────────────────────────────────────────────────────
const API = {
  token: null, user: null,
  async login(email, pw) {
    const r = await fetch('/api/game/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    this.token = d.token; this.user = d.user;
    localStorage.setItem('cw_session', JSON.stringify({token:this.token, user:this.user}));
  },
  async register(name, email, pw) {
    const r = await fetch('/api/game/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pw})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Registration failed');
    this.token = d.token; this.user = d.user;
    localStorage.setItem('cw_session', JSON.stringify({token:this.token, user:this.user}));
  },
  async save(score, wings) {
    if (!this.token) return;
    const pts = Math.floor(wings * 500 + score);
    await fetch('/api/game/save',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${this.token}`},body:JSON.stringify({score:pts,wings})}).catch(()=>{});
  },
};

function showPanel(name) {
  document.getElementById('pLogin').classList.add('hidden');
  document.getElementById('pRegister').classList.add('hidden');
  if (name === 'login') document.getElementById('pLogin').classList.remove('hidden');
  if (name === 'register') document.getElementById('pRegister').classList.remove('hidden');
}

async function doLogin() {
  try {
    await API.login(document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
    closeOverlay();
  } catch(e) { alert(e.message); }
}

async function doRegister() {
  try {
    await API.register(document.getElementById('regName').value, document.getElementById('regEmail').value, document.getElementById('regPass').value);
    closeOverlay();
  } catch(e) { alert(e.message); }
}

function closeOverlay() {
  document.getElementById('overlay').classList.add('hidden');
  if (gameInstance) gameInstance.scene.getAt(0).startGame();
}

// ── Phaser Engine ─────────────────────────────────────────────────────────────
class WingKing extends Phaser.Scene {
  constructor() { super('WingKing'); }

  preload() {
    this.load.audio('jump', '/sfx/wk-jump.mp3');
    this.load.audio('collect', '/sfx/wk-collect.mp3');
    this.load.audio('die', '/sfx/wk-die.mp3');
  }

  mk(key, w, h, fn) {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    fn(g); g.generateTexture(key, w, h); g.destroy();
  }

  createTextures() {
    // Platform tile (tiled for ground)
    this.mk('platform', 64, 64, g => {
      g.fillStyle(0x6b4226); g.fillRect(0, 0, 64, 64);
      g.fillStyle(0x4caf50); g.fillRect(0, 0, 64, 14);
      g.fillStyle(0x388e3c); g.fillRect(0, 0, 64, 4);
      g.fillStyle(0x8d5a2a); g.fillRect(0, 18, 64, 3); g.fillRect(0, 36, 64, 3);
    });
    // Chicken player (64×80 — facing right)
    this.mk('player', 64, 80, g => {
      g.fillStyle(0xf5c842); g.fillEllipse(32, 54, 44, 38); // body
      g.fillStyle(0xd4a82a); g.fillEllipse(20, 54, 18, 28); // wing
      g.fillStyle(0xf5c842); g.fillCircle(36, 24, 20); // head
      g.fillStyle(0xff2222); // comb
      g.fillCircle(28, 8, 6); g.fillCircle(36, 4, 7); g.fillCircle(44, 8, 6);
      g.fillStyle(0xff8c00); g.fillTriangle(52, 22, 62, 24, 52, 28); // beak
      g.fillStyle(0x111111); g.fillCircle(46, 20, 4); // eye
      g.fillStyle(0xffffff); g.fillCircle(47, 19, 1.5);
      g.fillStyle(0xff8c00); g.fillRect(26, 70, 6, 9); g.fillRect(36, 70, 6, 9); // legs
    });
    // Bin obstacle (grey trash can)
    this.mk('bin', 48, 56, g => {
      g.fillStyle(0x888888); g.fillRoundedRect(6, 12, 36, 40, 4);
      g.fillStyle(0x666666); g.fillRoundedRect(2, 6, 44, 10, 4); // lid
      g.fillStyle(0xaaaaaa); g.fillRect(4, 8, 8, 4); // lid handle
      g.fillStyle(0x999999); g.fillRect(14, 18, 5, 26); g.fillRect(24, 18, 5, 26); // ridges
      g.fillStyle(0x555555); g.fillRect(6, 48, 36, 4); // base
    });
    // Inspector obstacle (suited purple figure)
    this.mk('inspector', 48, 64, g => {
      g.fillStyle(0x6a0dad); g.fillRect(10, 28, 28, 32); // suit body
      g.fillStyle(0xffd700); g.fillRect(20, 28, 8, 20); // gold tie
      g.fillStyle(0xf5c842); g.fillCircle(24, 20, 14); // face
      g.fillStyle(0x4a0080); g.fillRect(8, 2, 32, 12); g.fillRect(6, 12, 36, 6); // hat
      g.fillStyle(0x111111); g.fillCircle(19, 18, 3); g.fillCircle(29, 18, 3); // eyes
      g.fillStyle(0xcccccc); g.fillRect(15, 16, 18, 5); // glasses
      g.fillStyle(0xf5c842); g.fillRect(14, 58, 8, 6); g.fillRect(26, 58, 8, 6); // legs
    });
    // Wing collectible (gold drumstick)
    this.mk('wing', 36, 36, g => {
      g.fillStyle(0xc8660a); g.fillCircle(18, 12, 12); // meat
      g.fillStyle(0xf5e6d0); g.fillRoundedRect(13, 20, 10, 14, 4); // bone
      g.fillStyle(0xffd700); // gold sheen
      g.fillCircle(14, 9, 4);
    });
  }

  create() {
    const W = 800, H = 400;
    this.createTextures();

    // Dark sky with city silhouette feel
    this.add.rectangle(400, 200, 800, 400, 0x1a1a2e);

    // Ground
    this.ground = this.add.tileSprite(400, 370, 800, 60, 'platform');
    this.physics.add.existing(this.ground, true);

    // Player
    this.player = this.physics.add.sprite(150, 200, 'player');
    this.player.setCollideWorldBounds(true);
    this.player.setScale(0.5).setDepth(10);
    this.player.body.setSize(60, 70).setOffset(34, 37);
    this.physics.add.collider(this.player, this.ground);

    // Groups
    this.obstacles = this.physics.add.group();
    this.wingsGroup = this.physics.add.group();

    // Collisions
    this.physics.add.overlap(this.player, this.obstacles, this.hitObstacle, null, this);
    this.physics.add.overlap(this.player, this.wingsGroup, this.collectWing, null, this);

    // State
    this.score = 0;
    this.wings = 0;
    this.gameActive = false;
    this.speed = 400;
    this.jumps = 0;

    // HUD
    this.scoreText = this.add.text(400, 30, 'SCORE: 0', { fontSize: '24px', fontWeight: '900', color: '#ff9800', fontFamily: 'monospace' }).setOrigin(0.5).setDepth(100);
    this.wingsText = this.add.text(30, 30, '🍗 0', { fontSize: '24px', fontWeight: '900', color: '#fff', fontFamily: 'monospace' }).setDepth(100);

    // Input
    this.input.on('pointerdown', () => this.doJump());
    this.input.keyboard.on('keydown-SPACE', () => this.doJump());
    this.input.keyboard.on('keydown-UP', () => this.doJump());

    // Auto-spawn
    this.obsTimer = this.time.addEvent({ delay: 1500, callback: this.spawnObstacle, callbackScope: this, loop: true, paused: true });
    this.wingTimer = this.time.addEvent({ delay: 1000, callback: this.spawnWing, callbackScope: this, loop: true, paused: true });

    // If session already restored (overlay hidden before scene ready), start game
    if (document.getElementById('overlay').classList.contains('hidden')) {
      this.time.delayedCall(50, () => this.startGame());
    }
  }

  startGame() {
    this.gameActive = true;
    this.score = 0;
    this.wings = 0;
    this.speed = 400;
    this.player.setPosition(150, 200);
    this.player.setAlpha(1);
    this.player.clearTint();
    this.obstacles.clear(true, true);
    this.wingsGroup.clear(true, true);
    this.obsTimer.paused = false;
    this.wingTimer.paused = false;
    this.physics.resume();
  }

  update(time, delta) {
    if (!this.gameActive) return;

    this.ground.tilePositionX += (this.speed * 0.001) * delta;

    this.score += delta * 0.01;
    this.scoreText.setText('SCORE: ' + Math.floor(this.score));

    // Ramp speed
    this.speed += delta * 0.01; // Faster ramping

    // Ground reset jump
    if (this.player.body.touching.down) {
      this.jumps = 0;
    }

    // Clean up
    this.obstacles.children.each(o => { if (o.x < -50) o.destroy(); });
    this.wingsGroup.children.each(w => { if (w.x < -50) w.destroy(); });
  }

  doJump() {
    if (!this.gameActive) return;
    if (this.jumps < 2) {
      this.player.setVelocityY(-650);
      this.jumps++;
      this.sound.play('jump', { volume: 0.5 });
    }
  }

  spawnObstacle() {
    if (!this.gameActive) return;
    const type = Math.random() > 0.5 ? 'bin' : 'inspector';
    const o = this.obstacles.create(850, 320, type);
    o.setScale(0.5).setOrigin(0.5, 1);
    o.body.allowGravity = false;
    o.setVelocityX(-this.speed);
  }

  spawnWing() {
    if (!this.gameActive) return;
    const w = this.wingsGroup.create(850, Phaser.Math.Between(100, 280), 'wing');
    w.setScale(0.4);
    w.body.allowGravity = false;
    w.setVelocityX(-this.speed);
    // Bobbing tween
    this.tweens.add({ targets: w, y: w.y - 20, duration: 600, yoyo: true, loop: -1 });
  }

  collectWing(player, wing) {
    wing.destroy();
    this.wings++;
    this.wingsText.setText('🍗 ' + this.wings);
    this.sound.play('collect', { volume: 0.5 });
  }

  hitObstacle() {
    this.gameActive = false;
    this.physics.pause();
    this.player.setTint(0xff0000);
    this.sound.play('die', { volume: 0.6 });
    this.cameras.main.shake(300, 0.03);
    this.obsTimer.paused = true;
    this.wingTimer.paused = true;
    
    setTimeout(() => {
      document.getElementById('overlay').classList.remove('hidden');
      API.save(this.score, this.wings);
    }, 1000);
  }
}

const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 400,
  parent: 'game-container',
  physics: { default: 'arcade', arcade: { gravity: { y: 2000 }, debug: false } },
  scene: WingKing,
  antialias: true
};

let gameInstance = new Phaser.Game(config);

// Restore session — overlay starts hidden; show it only if no valid session
const s = JSON.parse(localStorage.getItem('cw_session') || 'null');
if (s && s.token) {
  API.token = s.token; API.user = s.user;
  // overlay stays hidden, create() will auto-start
} else {
  document.getElementById('overlay').classList.remove('hidden');
}
</script>
</body>
</html>
