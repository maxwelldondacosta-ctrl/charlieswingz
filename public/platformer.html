<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Chicken Flight – Charlie's Wingz Arcade</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  body { margin: 0; background: #0d0d1a; overflow: hidden; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #game-container { border: 4px solid #e8a838; border-radius: 12px; box-shadow: 0 0 40px rgba(232, 168, 56, 0.2); overflow: hidden; }
  .ui-overlay { position: fixed; inset: 0; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  .panel { background: rgba(26, 26, 46, 0.95); border: 2px solid #ff9800; border-radius: 12px; padding: 40px; width: 360px; color: #fff; text-align: center; pointer-events: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
  h2 { color: #ff9800; margin-bottom: 20px; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
  input { width: 100%; padding: 12px; margin: 8px 0; background: #05050a; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 1rem; outline: none; }
  input:focus { border-color: #ff9800; }
  button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; transition: transform 0.1s; }
  button:active { transform: scale(0.98); }
  .btn-primary { background: #ff9800; color: #000; }
  .btn-secondary { background: transparent; border: 1px solid #444; color: #888; font-size: 0.9rem; }
  .hidden { display: none !important; }
  #nav { position: fixed; bottom: 20px; color: #ff9800; font-size: 0.9rem; text-decoration: none; font-weight: 600; opacity: 0.6; transition: opacity 0.2s; }
  #nav:hover { opacity: 1; }
</style>
</head>
<body>

<div id="game-container"></div>

<div class="ui-overlay hidden" id="overlay">
  <!-- Game Over (shown when logged in) -->
  <div class="panel hidden" id="pGameOver">
    <h2>Game Over</h2>
    <div id="goScore" style="font-size:1.4rem;color:#fff;margin:8px 0"></div>
    <div id="goCP" style="font-size:1.1rem;color:#e8a838;margin:0 0 20px"></div>
    <button class="btn-primary" onclick="closeOverlay()">Play Again</button>
    <button class="btn-secondary" onclick="location.href='/play-win'">← Arcade</button>
  </div>
  <!-- Login (shown when not logged in) -->
  <div class="panel" id="pLogin">
    <h2>Chicken Flight</h2>
    <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="btn-primary" onclick="doLogin()">Start Mission</button>
    <button class="btn-secondary" onclick="showPanel('register')">Create Account</button>
    <button class="btn-secondary" style="margin-top:20px; border:none" onclick="closeOverlay()">Play as Guest</button>
  </div>
  <!-- Register -->
  <div class="panel hidden" id="pRegister">
    <h2>Join the Flight</h2>
    <input id="regName" type="text" placeholder="Name">
    <input id="regEmail" type="email" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <button class="btn-primary" onclick="doRegister()">Join & Play</button>
    <button class="btn-secondary" onclick="showPanel('login')">← Back to Login</button>
  </div>
</div>

<a id="nav" href="/play-win">← BACK TO ARCADE</a>

<script>
// ── Auth & API ────────────────────────────────────────────────────────────────
const API = {
  token: null, user: null,
  async login(email, pw) {
    const r = await fetch('/api/game/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    this.token = d.token; this.user = d.user;
    localStorage.setItem('cw_session', JSON.stringify({token:this.token, user:this.user}));
  },
  async register(name, email, pw) {
    const r = await fetch('/api/game/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pw})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Registration failed');
    this.token = d.token; this.user = d.user;
    localStorage.setItem('cw_session', JSON.stringify({token:this.token, user:this.user}));
  },
  async save(score, wings) {
    if (!this.token) return;
    const pts = Math.floor(wings * 500 + score);
    await fetch('/api/game/save',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${this.token}`},body:JSON.stringify({score:pts,wings})}).catch(()=>{});
  },
};

function showPanel(name) {
  document.getElementById('pGameOver').classList.add('hidden');
  document.getElementById('pLogin').classList.add('hidden');
  document.getElementById('pRegister').classList.add('hidden');
  if (name === 'gameover') document.getElementById('pGameOver').classList.remove('hidden');
  if (name === 'login') document.getElementById('pLogin').classList.remove('hidden');
  if (name === 'register') document.getElementById('pRegister').classList.remove('hidden');
}

async function doLogin() {
  try {
    await API.login(document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
    closeOverlay();
  } catch(e) { alert(e.message); }
}

async function doRegister() {
  try {
    await API.register(document.getElementById('regName').value, document.getElementById('regEmail').value, document.getElementById('regPass').value);
    closeOverlay();
  } catch(e) { alert(e.message); }
}

function closeOverlay() {
  document.getElementById('overlay').classList.add('hidden');
  if (gameInstance) gameInstance.scene.getAt(0).startGame();
}

// ── Phaser Engine — Flappy Chicken ────────────────────────────────────────────
class WingKing extends Phaser.Scene {
  constructor() { super('WingKing'); }

  preload() {
    this.load.audio('jump', '/sfx/wk-jump.mp3');
    this.load.audio('collect', '/sfx/wk-collect.mp3');
    this.load.audio('die', '/sfx/wk-die.mp3');
  }

  mk(key, w, h, fn) {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    fn(g); g.generateTexture(key, w, h); g.destroy();
  }

  createTextures() {
    // Big chicken — faces right, rotated in-flight
    this.mk('chicken', 72, 72, g => {
      g.fillStyle(0xf5c842); g.fillEllipse(36, 46, 52, 42);   // body
      g.fillStyle(0xd4a82a); g.fillEllipse(18, 50, 24, 32);   // left wing
      g.fillStyle(0xf5c842); g.fillCircle(40, 22, 24);        // head
      g.fillStyle(0xff2222);                                    // comb
      g.fillCircle(30, 4, 7); g.fillCircle(40, 1, 9); g.fillCircle(50, 5, 7);
      g.fillStyle(0xff8c00); g.fillTriangle(60, 19, 72, 22, 60, 27); // beak
      g.fillStyle(0x111111); g.fillCircle(54, 18, 6);          // eye
      g.fillStyle(0xffffff); g.fillCircle(56, 16, 2.5);
      g.fillStyle(0xff4444); g.fillEllipse(60, 32, 8, 13);    // wattle
      g.fillStyle(0xff8c00); g.fillRect(30, 64, 8, 8); g.fillRect(44, 64, 8, 8); // legs
    });

    // Pipe segment — dark tiled wood stake
    this.mk('pipe_seg', 80, 8, g => {
      g.fillStyle(0x3d2b0e); g.fillRect(0, 0, 80, 8);
      g.fillStyle(0x5a3e18); g.fillRect(0, 0, 80, 3);
      g.fillStyle(0x2a1d08); g.fillRect(10, 0, 7, 8); g.fillRect(30, 0, 7, 8); g.fillRect(52, 0, 7, 8);
    });

    // Pipe cap — rounded dark band
    this.mk('pipe_cap', 94, 32, g => {
      g.fillStyle(0x2a1d08); g.fillRoundedRect(0, 0, 94, 32, 6);
      g.fillStyle(0x4a3010); g.fillRoundedRect(2, 2, 90, 26, 5);
      g.fillStyle(0x6a4818); g.fillRect(6, 8, 82, 10);
    });

    // Wing collectible
    this.mk('wing', 44, 44, g => {
      g.fillStyle(0xc8660a); g.fillCircle(22, 14, 14);
      g.fillStyle(0xf5e6d0); g.fillRoundedRect(16, 26, 12, 16, 4);
      g.fillStyle(0xffd700); g.fillCircle(16, 11, 6);
      g.fillStyle(0xffeedd); g.fillCircle(19, 9, 3);
    });

    // Scrolling city background strip
    this.mk('city', 480, 640, g => {
      g.fillStyle(0x0d0d1a); g.fillRect(0, 0, 480, 640);
      // Stars
      g.fillStyle(0xffffff);
      [[40,60],[120,30],[200,90],[300,45],[380,75],[60,150],[240,120],[420,180],
       [80,220],[160,200],[350,160],[450,240]].forEach(([x,y]) => g.fillRect(x,y,2,2));
      // Buildings silhouette
      g.fillStyle(0x1a1a2e);
      g.fillRect(0,440,70,200); g.fillRect(90,460,50,180); g.fillRect(160,420,80,220);
      g.fillRect(260,450,60,190); g.fillRect(340,410,90,230); g.fillRect(450,455,30,185);
      // Windows
      g.fillStyle(0xe8a838);
      [[12,455,8],[12,473,8],[28,455,8],[28,473,8],
       [172,432,8],[172,450,8],[192,432,8],[192,450,8],
       [348,422,8],[348,440,8],[370,422,8],[370,440,8]].forEach(([x,y,s])=>g.fillRect(x,y,s,s));
    });
  }

  create() {
    this.W = 480; this.H = 640;
    this.createTextures();

    this.add.image(240, 320, 'city');

    // Ground visual
    this.add.rectangle(240, 632, 480, 16, 0x3d2b0e);

    // Player — physics-driven (display at 42×42, physics body to match)
    this.player = this.physics.add.sprite(120, 300, 'chicken').setDepth(10);
    this.player.setDisplaySize(42, 42);
    this.player.body.setSize(32, 32).setOffset(20, 20);

    // State
    this.score = 0;
    this.wings = 0;
    this.gameActive = false;
    this.speed = 200;
    this.pipeList = [];   // manual pipe tracking
    this.wingList = [];

    // HUD
    this.scoreText = this.add.text(240, 36, '0', {
      fontSize: '64px', fontWeight: '900', color: '#ffffff',
      fontFamily: 'monospace', stroke: '#000000', strokeThickness: 8
    }).setOrigin(0.5).setDepth(100);
    this.wingsText = this.add.text(16, 14, '🍗 0', {
      fontSize: '28px', fontWeight: '900', color: '#e8a838', fontFamily: 'monospace'
    }).setDepth(100);

    // Input
    this.input.on('pointerdown', () => this.doFlap());
    this.input.keyboard.on('keydown-SPACE', () => this.doFlap());
    this.input.keyboard.on('keydown-UP', () => this.doFlap());

    // Timers
    this.pipeTimer = this.time.addEvent({ delay: 1800, callback: this.spawnPipePair, callbackScope: this, loop: true, paused: true });
    this.wingTimer = this.time.addEvent({ delay: 2400, callback: this.spawnWing, callbackScope: this, loop: true, paused: true });

    if (document.getElementById('overlay').classList.contains('hidden')) {
      this.time.delayedCall(50, () => this.startGame());
    }
  }

  startGame() {
    this.gameActive = true;
    this.score = 0;
    this.wings = 0;
    this.speed = 200;
    this.scoreText.setText('0');
    this.wingsText.setText('🍗 0');
    this.player.setPosition(120, 300).setAlpha(1).clearTint();
    this.player.setVelocity(0, 0).setAngle(0);
    // Destroy old pipes/wings
    this.pipeList.forEach(p => p.visuals.forEach(v => v.destroy()));
    this.pipeList = [];
    this.wingList.forEach(w => { w.img.destroy(); });
    this.wingList = [];
    this.pipeTimer.paused = false;
    this.wingTimer.paused = false;
    this.physics.resume();
  }

  update(time, delta) {
    if (!this.gameActive) return;
    const dt = delta / 1000;

    // Tilt chicken with velocity
    const vy = this.player.body.velocity.y;
    this.player.setAngle(Phaser.Math.Clamp(vy * 0.055, -28, 70));

    // Speed ramp
    this.speed = 200 + Math.floor(this.score / 8) * 8;

    // Move pipes
    for (let i = this.pipeList.length - 1; i >= 0; i--) {
      const p = this.pipeList[i];
      p.x -= this.speed * dt;
      p.visuals.forEach(v => { v.x = p.x; });

      // Score — pipe cleared
      if (!p.scored && p.x + 40 < this.player.x) {
        p.scored = true;
        this.score++;
        this.scoreText.setText(this.score);
      }

      // Collision — AABB with the two pipe columns
      const px = this.player.x, py = this.player.y, pr = 24;
      if (px + pr > p.x - 40 && px - pr < p.x + 40) {
        if (py - pr < p.gapY || py + pr > p.gapY + p.gapSize) {
          this.die(); return;
        }
      }

      if (p.x < -100) {
        p.visuals.forEach(v => v.destroy());
        this.pipeList.splice(i, 1);
      }
    }

    // Move wings
    for (let i = this.wingList.length - 1; i >= 0; i--) {
      const w = this.wingList[i];
      w.x -= this.speed * dt;
      w.img.x = w.x;
      const px = this.player.x, py = this.player.y;
      if (Math.abs(px - w.x) < 30 && Math.abs(py - w.y) < 30) {
        w.img.destroy();
        this.wingList.splice(i, 1);
        this.wings++;
        this.wingsText.setText('🍗 ' + this.wings);
        this.sound.play('collect', { volume: 0.5 });
        continue;
      }
      if (w.x < -60) { w.img.destroy(); this.wingList.splice(i, 1); }
    }

    // Die at ceiling or floor
    if (this.player.y < 0 || this.player.y > this.H - 20) {
      this.die();
    }
  }

  doFlap() {
    if (!this.gameActive) return;
    this.player.setVelocityY(-460);
    this.sound.play('jump', { volume: 0.5 });
  }

  spawnPipePair() {
    if (!this.gameActive) return;
    const gapSize = 180;
    const gapY = Phaser.Math.Between(110, this.H - gapSize - 110);
    const x = this.W + 60;

    // Top pipe — tileSprite fills from top down to gap
    const topPipe = this.add.tileSprite(x, 0, 80, gapY, 'pipe_seg').setOrigin(0.5, 0).setDepth(5);
    const topCap  = this.add.image(x, gapY + 16, 'pipe_cap').setDepth(6);

    // Bottom pipe — tileSprite fills from gap bottom to screen bottom
    const botY    = gapY + gapSize;
    const botH    = this.H - botY;
    const botPipe = this.add.tileSprite(x, botY, 80, botH, 'pipe_seg').setOrigin(0.5, 0).setDepth(5);
    const botCap  = this.add.image(x, botY - 16, 'pipe_cap').setFlipY(true).setDepth(6);

    this.pipeList.push({ x, gapY, gapSize, scored: false, visuals: [topPipe, topCap, botPipe, botCap] });
  }

  spawnWing() {
    if (!this.gameActive) return;
    const y = Phaser.Math.Between(140, this.H - 140);
    const img = this.add.image(this.W + 60, y, 'wing').setDepth(8);
    this.tweens.add({ targets: img, y: y - 22, duration: 700, yoyo: true, loop: -1 });
    this.wingList.push({ x: this.W + 60, y, img });
  }

  die() {
    if (!this.gameActive) return;
    this.gameActive = false;
    this.physics.pause();
    this.player.setTint(0xff4444);
    this.sound.play('die', { volume: 0.6 });
    this.cameras.main.shake(300, 0.03);
    this.pipeTimer.paused = true;
    this.wingTimer.paused = true;
    const finalScore = this.score;
    const finalWings = this.wings;
    setTimeout(() => {
      const cpEarned = Math.floor(finalWings * 500 + finalScore);
      if (API.token) {
        document.getElementById('goScore').textContent = `Score: ${finalScore}  🍗 Wings: ${finalWings}`;
        document.getElementById('goCP').textContent = `+${cpEarned.toLocaleString()} CP earned`;
        showPanel('gameover');
      } else {
        showPanel('login');
      }
      document.getElementById('overlay').classList.remove('hidden');
      API.save(finalScore, finalWings);
    }, 1000);
  }
}

const config = {
  type: Phaser.AUTO,
  width: 480,
  height: 640,
  parent: 'game-container',
  physics: { default: 'arcade', arcade: { gravity: { y: 1600 }, debug: false } },
  scene: WingKing,
  antialias: true
};

let gameInstance = new Phaser.Game(config);

// Restore session — overlay starts hidden; show it only if no valid session
const s = JSON.parse(localStorage.getItem('cw_session') || 'null');
if (s && s.token) {
  API.token = s.token; API.user = s.user;
  // overlay stays hidden, create() will auto-start
} else {
  document.getElementById('overlay').classList.remove('hidden');
}
</script>
</body>
</html>
