<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Charlie's Wingz</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #f5f0e8; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1a1a2e; border: 1px solid rgba(212,175,55,0.3); border-radius: 14px; padding: 32px; max-width: 380px; width: 100%; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo span { font-size: 2.5rem; }
        h1 { font-family: 'Bebas Neue', sans-serif; color: #d4af37; font-size: 1.6rem; text-align: center; letter-spacing: 2px; margin-bottom: 8px; }
        .sub { text-align: center; font-size: 0.85rem; color: #888; margin-bottom: 24px; }
        input { width: 100%; padding: 14px 16px; font-size: 16px; border-radius: 10px; background: #0d1b2a; border: 1px solid #233554; color: #eee; outline: none; margin-bottom: 12px; font-family: 'Inter', sans-serif; }
        input:focus { border-color: #d4af37; }
        .btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 800; background: linear-gradient(135deg, #d4af37, #b8952e); color: #000; border: none; border-radius: 10px; cursor: pointer; letter-spacing: 1px; font-family: 'Inter', sans-serif; }
        .btn:disabled { opacity: 0.5; cursor: default; }
        .error { color: #e53935; font-size: 0.85rem; text-align: center; margin-top: 12px; display: none; }
        .success { color: #4caf50; font-size: 0.85rem; text-align: center; margin-top: 12px; display: none; }
        .back { display: block; text-align: center; margin-top: 16px; font-size: 0.8rem; color: #d4af37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><span>👑</span></div>
        <h1>RESET PASSWORD</h1>
        <p class="sub">Enter your new password below</p>

        <div id="formView">
            <input type="password" id="newPass" placeholder="New password (min 6 characters)">
            <input type="password" id="confirmPass" placeholder="Confirm new password">
            <button class="btn" id="resetBtn" onclick="doReset()">SET NEW PASSWORD</button>
            <p class="error" id="errorMsg"></p>
        </div>

        <div id="successView" style="display:none;text-align:center">
            <div style="font-size:2.5rem;margin-bottom:12px">✅</div>
            <p style="font-size:1rem;font-weight:600;color:#4caf50;margin-bottom:8px">Password updated!</p>
            <p style="font-size:0.85rem;color:#888;margin-bottom:20px">You can now sign in with your new password.</p>
            <a href="/" class="btn" style="display:block;text-decoration:none;text-align:center">GO TO CHARLIE'S WINGZ</a>
        </div>

        <div id="expiredView" style="display:none;text-align:center">
            <div style="font-size:2.5rem;margin-bottom:12px">⏰</div>
            <p style="font-size:1rem;font-weight:600;color:#e53935;margin-bottom:8px">Link expired</p>
            <p style="font-size:0.85rem;color:#888;margin-bottom:20px">This reset link is no longer valid. Please request a new one.</p>
            <a href="/" class="btn" style="display:block;text-decoration:none;text-align:center">BACK TO SITE</a>
        </div>

        <a href="/" class="back">← Back to Charlie's Wingz</a>
    </div>

    <script>
        function getToken() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        // Check token exists on load
        if (!getToken()) {
            document.getElementById('formView').style.display = 'none';
            document.getElementById('expiredView').style.display = 'block';
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function doReset() {
            const pass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;

            if (!pass || !confirm) return showError('Please fill in both fields');
            if (pass.length < 6) return showError('Password must be at least 6 characters');
            if (pass !== confirm) return showError('Passwords don\'t match');

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = 'UPDATING...';
            document.getElementById('errorMsg').style.display = 'none';

            try {
                const res = await fetch('/api/account/reset-confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: getToken(), password: pass })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('formView').style.display = 'none';
                    document.getElementById('successView').style.display = 'block';
                    // Clear game session so they log in fresh
                    try { localStorage.removeItem('cw_session'); } catch(e) {}
                } else {
                    if (data.error && data.error.includes('expired')) {
                        document.getElementById('formView').style.display = 'none';
                        document.getElementById('expiredView').style.display = 'block';
                    } else {
                        showError(data.error || 'Something went wrong');
                        btn.disabled = false;
                        btn.textContent = 'SET NEW PASSWORD';
                    }
                }
            } catch(e) {
                showError('Connection error — please try again');
                btn.disabled = false;
                btn.textContent = 'SET NEW PASSWORD';
            }
        }

        // Allow Enter key
        document.getElementById('confirmPass').addEventListener('keydown', e => {
            if (e.key === 'Enter') doReset();
        });
    </script>
</body>
</html>
