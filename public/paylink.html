<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Orders — Charlie's Wingz</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0d0d0d;
            --dark: #1a1a1a;
            --mid: #2a2a2a;
            --gold: #d4af37;
            --cream: #f5f0e8;
            --burgundy: #8b1a1a;
            --green: #4caf50;
            --red: #c0392b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--black); color: var(--cream); font-family: 'Inter', sans-serif; min-height: 100vh; }

        .header {
            background: var(--dark); border-bottom: 1px solid rgba(212,175,55,0.3);
            padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .header h1 { font-family: 'Bebas Neue', sans-serif; color: var(--gold); font-size: 1.4rem; letter-spacing: 0.1em; }
        .back-btn {
            color: var(--gold); text-decoration: none; font-size: 0.85rem;
            border: 1px solid rgba(212,175,55,0.4); padding: 0.4rem 0.9rem; border-radius: 4px;
        }

        .container { max-width: 720px; margin: 0 auto; padding: 1.5rem; }

        /* Login */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .login-box {
            background: var(--dark); border: 1px solid var(--gold); border-radius: 12px;
            padding: 2rem; width: 100%; max-width: 340px; text-align: center;
        }
        .login-box h2 { color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; margin-bottom: 1rem; }
        .login-box input {
            width: 100%; padding: 0.75rem; background: var(--mid); border: 1px solid #444;
            border-radius: 6px; color: var(--cream); font-size: 1rem; margin-bottom: 1rem;
        }
        .login-box input:focus { outline: none; border-color: var(--gold); }
        .login-btn {
            width: 100%; padding: 0.75rem; background: var(--gold); color: var(--black);
            border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 1rem;
        }
        .login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; display: none; }

        /* Main UI */
        #main-screen { display: none; }

        .section {
            background: var(--dark); border: 1px solid #2a2a2a; border-radius: 10px;
            padding: 1.25rem; margin-bottom: 1.25rem;
        }
        .section-title {
            font-family: 'Bebas Neue', sans-serif; color: var(--gold);
            font-size: 1.1rem; letter-spacing: 0.1em; margin-bottom: 1rem;
        }

        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.8rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
        .form-input {
            width: 100%; padding: 0.65rem 0.9rem; background: var(--mid); border: 1px solid #444;
            border-radius: 6px; color: var(--cream); font-size: 0.95rem;
        }
        .form-input:focus { outline: none; border-color: var(--gold); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

        /* Menu items */
        .menu-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .menu-tab {
            padding: 0.35rem 0.8rem; background: var(--mid); border: 1px solid #444;
            border-radius: 4px; color: #aaa; cursor: pointer; font-size: 0.8rem;
        }
        .menu-tab.active { background: var(--gold); color: var(--black); border-color: var(--gold); font-weight: 700; }

        .menu-items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.5rem; }
        .menu-item-btn {
            padding: 0.6rem 0.75rem; background: var(--mid); border: 1px solid #333;
            border-radius: 6px; color: var(--cream); cursor: pointer; text-align: left;
            transition: border-color 0.2s; font-size: 0.85rem;
        }
        .menu-item-btn:hover { border-color: var(--gold); }
        .menu-item-btn .item-name { display: block; font-weight: 500; }
        .menu-item-btn .item-price { color: var(--gold); font-size: 0.8rem; font-family: 'Bebas Neue', sans-serif; }

        /* Custom item */
        .custom-item-row { display: grid; grid-template-columns: 1fr auto auto; gap: 0.5rem; align-items: end; margin-bottom: 0.75rem; }
        .add-custom-btn {
            padding: 0.65rem 1rem; background: var(--mid); border: 1px solid var(--gold);
            border-radius: 6px; color: var(--gold); cursor: pointer; font-size: 0.85rem; white-space: nowrap;
        }

        /* Order items list */
        .order-items-list { min-height: 60px; }
        .order-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.6rem 0.75rem; background: var(--mid); border-radius: 6px; margin-bottom: 0.4rem;
        }
        .order-item-name { font-size: 0.9rem; flex: 1; }
        .order-item-price { color: var(--gold); font-family: 'Bebas Neue', sans-serif; margin: 0 0.75rem; }
        .order-item-remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1.1rem; opacity: 0.7; }
        .order-item-remove:hover { opacity: 1; }
        .order-empty { color: #555; font-size: 0.85rem; text-align: center; padding: 1rem; }

        .order-total {
            display: flex; justify-content: space-between; padding: 0.75rem;
            border-top: 1px solid #333; margin-top: 0.5rem; font-weight: 600;
            color: var(--gold); font-size: 1.1rem;
        }

        /* Generate button */
        .generate-btn {
            width: 100%; padding: 1rem; background: var(--gold); color: var(--black);
            border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .generate-btn:hover { background: var(--cream); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Result */
        .result-box {
            display: none; background: rgba(76,175,80,0.1); border: 1px solid var(--green);
            border-radius: 8px; padding: 1.25rem; margin-top: 1rem; text-align: center;
        }
        .result-box h3 { color: var(--green); margin-bottom: 0.75rem; font-size: 1rem; }
        .payment-link {
            background: var(--mid); border: 1px solid #444; border-radius: 6px;
            padding: 0.75rem; font-size: 0.85rem; word-break: break-all; color: #4a9eff;
            margin-bottom: 0.75rem; text-align: left;
        }
        .copy-btn {
            padding: 0.6rem 1.5rem; background: var(--gold); color: var(--black);
            border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.9rem;
            margin: 0.25rem;
        }
        .whatsapp-btn {
            padding: 0.6rem 1.5rem; background: #25d366; color: #fff;
            border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.9rem;
            margin: 0.25rem; text-decoration: none; display: inline-block;
        }
        .sms-btn {
            padding: 0.6rem 1.5rem; background: #2196f3; color: #fff;
            border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.9rem;
            margin: 0.25rem; text-decoration: none; display: inline-block;
        }

        .error-box {
            display: none; background: rgba(192,57,43,0.1); border: 1px solid var(--red);
            border-radius: 8px; padding: 1rem; margin-top: 1rem; color: var(--red); font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .menu-items-grid { grid-template-columns: 1fr 1fr; }
            .custom-item-row { grid-template-columns: 1fr 1fr; }
            .custom-item-row .add-custom-btn { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>👑 Phone Orders</h1>
    <a href="/admin" class="back-btn">← Admin</a>
</div>

<!-- Login -->
<div id="login-screen">
    <div class="login-box">
        <h2>Sign In</h2>
        <input type="password" id="password-input" placeholder="Admin password">
        <button class="login-btn" onclick="login()">SIGN IN</button>
        <p class="login-error" id="login-error">Incorrect password</p>
    </div>
</div>

<!-- Main -->
<div id="main-screen">
    <div class="container">

        <!-- Customer Details -->
        <div class="section">
            <div class="section-title">Customer Details</div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-input" id="c-name" placeholder="Customer name">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="tel" class="form-input" id="c-phone" placeholder="07xxx xxxxxx">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Notes (optional)</label>
                <input type="text" class="form-input" id="c-notes" placeholder="Address, special requests, etc.">
            </div>
        </div>

        <!-- Add Items -->
        <div class="section">
            <div class="section-title">Add Items</div>
            <div class="menu-tabs" id="menu-tabs"></div>
            <div class="menu-items-grid" id="menu-items-grid"></div>
        </div>

        <!-- Custom Item -->
        <div class="section">
            <div class="section-title">Custom Item</div>
            <div class="custom-item-row">
                <div class="form-group" style="margin:0">
                    <label class="form-label">Item Name</label>
                    <input type="text" class="form-input" id="custom-name" placeholder="e.g. Catering platter">
                </div>
                <div class="form-group" style="margin:0">
                    <label class="form-label">Price (£)</label>
                    <input type="number" class="form-input" id="custom-price" placeholder="0.00" min="0" step="0.01">
                </div>
                <button class="add-custom-btn" onclick="addCustomItem()">+ Add</button>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="section">
            <div class="section-title">Order Summary</div>
            <div class="order-items-list" id="order-items">
                <div class="order-empty">No items added yet</div>
            </div>
            <div class="order-total" id="order-total" style="display:none">
                <span>Total</span>
                <span id="total-amount">£0.00</span>
            </div>
        </div>

        <button class="generate-btn" id="generate-btn" onclick="generatePaymentLink()" disabled>
            👑 GENERATE PAYMENT LINK
        </button>

        <div class="result-box" id="result-box">
            <h3>✓ Payment Link Ready</h3>
            <div class="payment-link" id="payment-link-url"></div>
            <div>
                <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
                <a class="whatsapp-btn" id="whatsapp-link" href="#" target="_blank">💬 WhatsApp</a>
                <a class="sms-btn" id="sms-link" href="#">📱 SMS</a>
            </div>
            <p style="font-size:0.75rem;color:#888;margin-top:0.75rem">Link expires in 24 hours</p>
        </div>

        <div class="error-box" id="error-box"></div>

    </div>
</div>

<script>
    let sessionToken = sessionStorage.getItem('admin_token') || '';
    let orderItems = [];

    const MENU_DATA = {
        'Wings': {
            'w6':  { name: '6 Wings',  price: 1075 },
            'w10': { name: '10 Wings', price: 1795 },
            'w20': { name: '20 Wings', price: 3145 },
            'w30': { name: '30 Wings', price: 4495 },
            'w50': { name: '50 Wings', price: 7195 }
        },
        'Meals': {
            'm6':  { name: '6 Wing Meal',  price: 1345 },
            'm10': { name: '10 Wing Meal', price: 2065 },
            'm20': { name: '20 Wing Meal', price: 3415 },
            'm30': { name: '30 Wing Meal', price: 4945 }
        },
        'Bundles': {
            'b-duo':    { name: 'Duo Bundle',    price: 3795 },
            'b-family': { name: 'Family Bundle', price: 5295 },
            'b-party':  { name: 'Party Bundle',  price: 8495 }
        },
        'Sides': {
            's-fries':  { name: 'Fries',        price: 395 },
            's-loaded': { name: 'Loaded Fries', price: 595 },
            's-dip':    { name: 'Extra Dip',    price: 100 },
            's-drink':  { name: 'Drink',        price: 200 }
        }
    };

    // ── Auth ──────────────────────────────────────────────────────────────────
    document.getElementById('password-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });

    async function login() {
        const pw = document.getElementById('password-input').value;
        const res = await fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw })
        });
        const data = await res.json();
        if (data.token) {
            sessionToken = data.token;
            sessionStorage.setItem('admin_token', sessionToken);
            showMain();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function showMain() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        buildMenuTabs();
    }

    if (sessionToken) showMain();

    // ── Menu ──────────────────────────────────────────────────────────────────
    let activeTab = 'Wings';

    function buildMenuTabs() {
        const tabsEl = document.getElementById('menu-tabs');
        tabsEl.innerHTML = Object.keys(MENU_DATA).map(cat =>
            `<button class="menu-tab ${cat === activeTab ? 'active' : ''}" onclick="switchTab('${cat}')">${cat}</button>`
        ).join('');
        renderMenuItems();
    }

    function switchTab(cat) {
        activeTab = cat;
        document.querySelectorAll('.menu-tab').forEach(b => b.classList.toggle('active', b.textContent === cat));
        renderMenuItems();
    }

    function renderMenuItems() {
        const grid = document.getElementById('menu-items-grid');
        const items = MENU_DATA[activeTab];
        grid.innerHTML = Object.entries(items).map(([id, item]) => `
            <button class="menu-item-btn" onclick="addMenuItem('${id}', '${item.name}', ${item.price})">
                <span class="item-name">${item.name}</span>
                <span class="item-price">£${(item.price/100).toFixed(2)}</span>
            </button>
        `).join('');
    }

    // ── Order items ───────────────────────────────────────────────────────────
    function addMenuItem(id, name, price) {
        const existing = orderItems.findIndex(i => i.id === id);
        if (existing >= 0) {
            orderItems[existing].qty++;
        } else {
            orderItems.push({ id, name, price, qty: 1 });
        }
        renderOrder();
    }

    function addCustomItem() {
        const name = document.getElementById('custom-name').value.trim();
        const price = Math.round(parseFloat(document.getElementById('custom-price').value) * 100);
        if (!name || !price || price <= 0) return;
        orderItems.push({ id: `custom-${Date.now()}`, name, price, qty: 1 });
        document.getElementById('custom-name').value = '';
        document.getElementById('custom-price').value = '';
        renderOrder();
    }

    function removeItem(idx) {
        orderItems.splice(idx, 1);
        renderOrder();
    }

    function renderOrder() {
        const el = document.getElementById('order-items');
        const totalEl = document.getElementById('order-total');
        const genBtn = document.getElementById('generate-btn');
        const resultBox = document.getElementById('result-box');
        const errorBox = document.getElementById('error-box');

        resultBox.style.display = 'none';
        errorBox.style.display = 'none';

        if (!orderItems.length) {
            el.innerHTML = '<div class="order-empty">No items added yet</div>';
            totalEl.style.display = 'none';
            genBtn.disabled = true;
            return;
        }

        const total = orderItems.reduce((s, i) => s + i.price * i.qty, 0);
        el.innerHTML = orderItems.map((item, idx) => `
            <div class="order-item">
                <span class="order-item-name">${item.qty > 1 ? item.qty + '× ' : ''}${item.name}</span>
                <span class="order-item-price">£${((item.price * item.qty)/100).toFixed(2)}</span>
                <button class="order-item-remove" onclick="removeItem(${idx})">×</button>
            </div>
        `).join('');

        totalEl.style.display = 'flex';
        document.getElementById('total-amount').textContent = `£${(total/100).toFixed(2)}`;
        genBtn.disabled = false;
    }

    // ── Generate payment link ─────────────────────────────────────────────────
    async function generatePaymentLink() {
        const btn = document.getElementById('generate-btn');
        const resultBox = document.getElementById('result-box');
        const errorBox = document.getElementById('error-box');
        resultBox.style.display = 'none';
        errorBox.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'GENERATING...';

        const name = document.getElementById('c-name').value || 'Phone Order';
        const phone = document.getElementById('c-phone').value || '';
        const address = document.getElementById('c-address').value || '';
        const notes = address ? `Delivery: ${address}` : 'Phone order';

        const lineItems = orderItems.map(item => ({
            name: item.name,
            quantity: String(item.qty),
            basePriceMoney: { amount: String(item.price), currency: 'GBP' }
        }));

        try {
            const res = await fetch('/admin/api/paylink', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
                body: JSON.stringify({ name, phone, notes, lineItems, total: orderItems.reduce((s,i) => s + i.price*i.qty, 0) })
            });

            const data = await res.json();

            if (data.url) {
                const urlEl = document.getElementById('payment-link-url');
                urlEl.textContent = data.url;
                resultBox.style.display = 'block';

                const msg = encodeURIComponent(`Hi ${name}! 👑 Your Charlie's Wingz order is ready to pay. Click here: ${data.url}`);
                document.getElementById('whatsapp-link').href = `https://wa.me/44${phone.replace(/^0/, '').replace(/\s/g,'')}?text=${msg}`;
                document.getElementById('sms-link').href = `sms:${phone}?body=${msg}`;
            } else {
                errorBox.textContent = data.error || 'Failed to generate link';
                errorBox.style.display = 'block';
            }
        } catch(e) {
            errorBox.textContent = 'Network error — please try again';
            errorBox.style.display = 'block';
        }

        btn.disabled = false;
        btn.textContent = '👑 GENERATE PAYMENT LINK';
    }

    function copyLink() {
        const url = document.getElementById('payment-link-url').textContent;
        navigator.clipboard.writeText(url).then(() => {
            const btn = event.target;
            btn.textContent = '✓ Copied!';
            setTimeout(() => btn.textContent = '📋 Copy Link', 2000);
        });
    }
</script>
</body>
</html>
