<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Charlie's Wingz — Snake</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  body { margin: 0; background: #0d0d1a; overflow: hidden; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #game-container { border: 4px solid #4caf50; border-radius: 12px; box-shadow: 0 0 40px rgba(76, 175, 80, 0.2); overflow: hidden; }
  .ui-overlay { position: fixed; inset: 0; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  .panel { background: rgba(26, 26, 46, 0.95); border: 2px solid #4caf50; border-radius: 12px; padding: 40px; width: 360px; color: #fff; text-align: center; pointer-events: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
  h2 { color: #4caf50; margin-bottom: 20px; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
  input { width: 100%; padding: 12px; margin: 8px 0; background: #05050a; border: 1px solid #444; color: #fff; border-radius: 8px; font-size: 1rem; outline: none; }
  input:focus { border-color: #4caf50; }
  button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; transition: transform 0.1s; }
  button:active { transform: scale(0.98); }
  .btn-primary { background: #4caf50; color: #000; }
  .btn-secondary { background: transparent; border: 1px solid #444; color: #888; font-size: 0.9rem; }
  .hidden { display: none !important; }
  #nav { position: fixed; bottom: 20px; color: #4caf50; font-size: 0.9rem; text-decoration: none; font-weight: 600; opacity: 0.6; transition: opacity 0.2s; }
  #nav:hover { opacity: 1; }
</style>
</head>
<body>

<div id="game-container"></div>

<div class="ui-overlay" id="overlay">
  <!-- Login -->
  <div class="panel" id="pLogin">
    <div style="font-size:4rem;margin-bottom:10px;">🐍</div>
    <h2>Snake</h2>
    <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="btn-primary" onclick="doLogin()">Start Mission</button>
    <button class="btn-secondary" onclick="showPanel('register')">Create Account</button>
    <button class="btn-secondary" style="margin-top:20px; border:none" onclick="closeOverlay()">Play as Guest</button>
  </div>
  <!-- Register -->
  <div class="panel hidden" id="pRegister">
    <div style="font-size:4rem;margin-bottom:10px;">🐍</div>
    <h2>Join the Pit</h2>
    <input id="regName" type="text" placeholder="Name">
    <input id="regEmail" type="email" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">
    <button class="btn-primary" onclick="doRegister()">Join & Play</button>
    <button class="btn-secondary" onclick="showPanel('login')">← Back to Login</button>
  </div>
</div>

<a id="nav" href="/play-win">← BACK TO ARCADE</a>

<script>
// ── Auth & API ────────────────────────────────────────────────────────────────
const API = {
  token: null, user: null,
  async login(email, pw) {
    const r = await fetch('/api/game/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    this.token = d.token; this.user = d.user;
    localStorage.setItem('cw_session', JSON.stringify({token:this.token, user:this.user}));
  },
  async register(name, email, pw) {
    const r = await fetch('/api/game/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password:pw})});
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Registration failed');
    this.token = d.token; this.user = d.user;
    localStorage.setItem('cw_session', JSON.stringify({token:this.token, user:this.user}));
  },
  async save(score, wings, crowns) {
    if (!this.token) return;
    await fetch('/api/game/save',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${this.token}`},body:JSON.stringify({score,wings,crowns})}).catch(()=>{});
  },
};

function showPanel(name) {
  document.getElementById('pLogin').classList.add('hidden');
  document.getElementById('pRegister').classList.add('hidden');
  if (name === 'login') document.getElementById('pLogin').classList.remove('hidden');
  if (name === 'register') document.getElementById('pRegister').classList.remove('hidden');
}

async function doLogin() {
  try {
    await API.login(document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
    closeOverlay();
  } catch(e) { alert(e.message); }
}

async function doRegister() {
  try {
    await API.register(document.getElementById('regName').value, document.getElementById('regEmail').value, document.getElementById('regPass').value);
    closeOverlay();
  } catch(e) { alert(e.message); }
}

function closeOverlay() {
  document.getElementById('overlay').classList.add('hidden');
  if (gameInstance) gameInstance.scene.getAt(0).startGame();
}

// ── Phaser Engine ─────────────────────────────────────────────────────────────
class SnakeGame extends Phaser.Scene {
  constructor() { super('SnakeGame'); }

  preload() {
    this.load.audio('eat', '/sfx/snake-eat.mp3');
    this.load.audio('die', '/sfx/snake-die.mp3');
    this.load.audio('start', '/sfx/snake-start.mp3');
  }

  mk(key, w, h, fn) {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    fn(g); g.generateTexture(key, w, h); g.destroy();
  }

  create() {
    this.W = 600;
    this.H = 600;
    this.TILE_SIZE = 30;

    // Body segment
    this.mk('body', 30, 30, g => {
      g.fillStyle(0xe8a838); g.fillRoundedRect(2, 2, 26, 26, 5);
      g.lineStyle(2, 0xb07820, 1); g.strokeRoundedRect(2, 2, 26, 26, 5);
    });

    // Chicken head — faces right (east), rotated in code for direction
    this.mk('head', 30, 30, g => {
      g.fillStyle(0xf5c842); g.fillRoundedRect(2, 2, 26, 26, 5);
      g.lineStyle(2, 0xb07820, 1); g.strokeRoundedRect(2, 2, 26, 26, 5);
      g.fillStyle(0xff2222); g.fillCircle(8, 3, 3); g.fillCircle(15, 1, 4); g.fillCircle(22, 3, 3); // comb
      g.fillStyle(0x111111); g.fillCircle(22, 11, 4);  // eye
      g.fillStyle(0xffffff); g.fillCircle(23, 10, 1.5);
      g.fillStyle(0xff8c00); g.fillTriangle(27, 14, 30, 16, 27, 18); // beak
      g.fillStyle(0xff4444); g.fillRect(2, 20, 5, 4);  // wattle
    });

    // Wing food — gold drumstick
    this.mk('wing', 30, 30, g => {
      g.fillStyle(0xc8660a); g.fillCircle(15, 11, 11);
      g.fillStyle(0xf5e6d0); g.fillRoundedRect(11, 20, 8, 9, 3);
      g.fillStyle(0xffd700); g.fillCircle(11, 8, 4);
      g.fillStyle(0xffeedd); g.fillCircle(13, 6, 2);
    });

    // Crown collectible
    this.mk('crown', 30, 30, g => {
      g.fillStyle(0xffd700);
      g.fillRect(4, 17, 22, 9);                         // base
      g.fillTriangle(4, 17, 4, 7, 10, 13);              // left spike
      g.fillTriangle(15, 17, 15, 4, 22, 13);            // center spike
      g.fillTriangle(20, 17, 26, 7, 26, 17);            // right spike
      g.fillStyle(0xe53935); g.fillCircle(8, 22, 3);    // left jewel
      g.fillStyle(0x4caf50); g.fillCircle(15, 22, 3);   // center jewel
      g.fillStyle(0xe53935); g.fillCircle(22, 22, 3);   // right jewel
      g.lineStyle(1, 0xb07820, 1); g.strokeRect(4, 17, 22, 9);
    });

    this.initGame();
  }

  initGame() {
    // Dark background with subtle grid
    this.add.rectangle(300, 300, 600, 600, 0x0d0d1a);
    const grid = this.add.graphics();
    grid.lineStyle(1, 0x1a1a2e, 1);
    for (let x = 0; x <= 600; x += this.TILE_SIZE || 30) grid.lineBetween(x, 0, x, 600);
    for (let y = 0; y <= 600; y += this.TILE_SIZE || 30) grid.lineBetween(0, y, 600, y);
    
    this.scoreText = this.add.text(10, 10, 'SCORE: 0', { fontSize: '20px', fontWeight: 'bold', fill: '#4caf50' }).setDepth(100);
    this.wingText = this.add.text(480, 10, '🍗 0', { fontSize: '20px', fontWeight: 'bold', fill: '#fff' }).setDepth(100);
    
    this.cursors = this.input.keyboard.createCursorKeys();
    
    this.snake = [];
    this.direction = Phaser.Math.Vector2.RIGHT;
    this.nextDirection = Phaser.Math.Vector2.RIGHT;
    this.gameActive = false;
    this.score = 0;
    this.wings = 0;
    this.crowns = 0;
    this.speed = 150; // ms per move
    this.lastMoveTime = 0;
    
    this.food = this.add.sprite(0, 0, 'wing').setScale(1).setDepth(10);
    this.crown = this.add.sprite(-100, -100, 'crown').setScale(1).setDepth(10).setVisible(false);
    
    // Swipe controls for mobile
    this.input.on('pointerup', this.handleSwipe, this);
  }

  handleSwipe(pointer) {
    if (!this.gameActive) return;
    const swipeTime = pointer.upTime - pointer.downTime;
    const swipeX = pointer.upX - pointer.downX;
    const swipeY = pointer.upY - pointer.downY;

    if (swipeTime < 1000) {
        if (Math.abs(swipeX) > Math.abs(swipeY)) {
            if (swipeX > 0 && this.direction.x !== -1) this.nextDirection = Phaser.Math.Vector2.RIGHT;
            else if (swipeX < 0 && this.direction.x !== 1) this.nextDirection = Phaser.Math.Vector2.LEFT;
        } else {
            if (swipeY > 0 && this.direction.y !== -1) this.nextDirection = Phaser.Math.Vector2.DOWN;
            else if (swipeY < 0 && this.direction.y !== 1) this.nextDirection = Phaser.Math.Vector2.UP;
        }
    }
  }

  startGame() {
    
    this.snake.forEach(seg => seg.destroy());
    this.snake = [];
    
    // Initial snake
    for (let i = 0; i < 3; i++) {
        const sprite = this.add.sprite(300 - i * this.TILE_SIZE, 300, i === 0 ? 'head' : 'body');
        sprite.setScale(1);
        sprite.setDepth(20 - i);
        this.snake.push(sprite);
    }
    
    this.direction = Phaser.Math.Vector2.RIGHT;
    this.nextDirection = Phaser.Math.Vector2.RIGHT;
    this.score = 0;
    this.wings = 0;
    this.crowns = 0;
    this.speed = 150;
    this.gameActive = true;
    this.scoreText.setText('SCORE: 0');
    this.wingText.setText('🍗 0');
    
    this.spawnFood();
    this.sound.play('start', { volume: 0.5 });
  }

  spawnFood() {
    let valid = false;
    let x, y;
    while (!valid) {
      x = Phaser.Math.Between(1, (this.W / this.TILE_SIZE) - 2) * this.TILE_SIZE + this.TILE_SIZE/2;
      y = Phaser.Math.Between(1, (this.H / this.TILE_SIZE) - 2) * this.TILE_SIZE + this.TILE_SIZE/2;
      valid = !this.snake.some(seg => seg.x === x && seg.y === y);
    }
    
    // 10% chance for a crown
    if (Math.random() < 0.1) {
        this.crown.setPosition(x, y).setVisible(true);
        this.food.setVisible(false);
    } else {
        this.food.setPosition(x, y).setVisible(true);
        this.crown.setVisible(false);
    }
  }

  update(time) {
    if (!this.gameActive) return;

    if (this.cursors.left.isDown && this.direction.x !== 1) this.nextDirection = Phaser.Math.Vector2.LEFT;
    else if (this.cursors.right.isDown && this.direction.x !== -1) this.nextDirection = Phaser.Math.Vector2.RIGHT;
    else if (this.cursors.up.isDown && this.direction.y !== 1) this.nextDirection = Phaser.Math.Vector2.UP;
    else if (this.cursors.down.isDown && this.direction.y !== -1) this.nextDirection = Phaser.Math.Vector2.DOWN;

    if (time >= this.lastMoveTime + this.speed) {
        this.lastMoveTime = time;
        this.moveSnake();
    }
  }

  moveSnake() {
    this.direction = this.nextDirection;
    
    const head = this.snake[0];
    const newX = head.x + this.direction.x * this.TILE_SIZE;
    const newY = head.y + this.direction.y * this.TILE_SIZE;

    // Wall collision
    if (newX < 0 || newX > this.W || newY < 0 || newY > this.H) {
        this.gameOver();
        return;
    }

    // Self collision
    for (let i = 1; i < this.snake.length; i++) {
        if (this.snake[i].x === newX && this.snake[i].y === newY) {
            this.gameOver();
            return;
        }
    }

    // Move body
    for (let i = this.snake.length - 1; i > 0; i--) {
        this.snake[i].setPosition(this.snake[i - 1].x, this.snake[i - 1].y);
    }

    // Move head
    head.setPosition(newX, newY);
    // Rotate head
    const angle = Math.atan2(this.direction.y, this.direction.x);
    head.setRotation(angle);

    // Check food
    if (this.food.visible && Math.abs(newX - this.food.x) < this.TILE_SIZE && Math.abs(newY - this.food.y) < this.TILE_SIZE) {
        this.eat(false);
    } else if (this.crown.visible && Math.abs(newX - this.crown.x) < this.TILE_SIZE && Math.abs(newY - this.crown.y) < this.TILE_SIZE) {
        this.eat(true);
    }
  }

  eat(isCrown) {
    this.sound.play('eat', { volume: 0.5 });
    
    if (isCrown) {
        this.score += 500;
        this.crowns++;
        this.speed = Math.max(50, this.speed - 5); // Speed up slightly
    } else {
        this.score += 100;
        this.wings++;
    }
    
    this.scoreText.setText('SCORE: ' + this.score);
    this.wingText.setText('🍗 ' + this.wings);

    // Grow tail
    const tail = this.snake[this.snake.length - 1];
    const newSeg = this.add.sprite(tail.x, tail.y, 'body').setScale(1).setDepth(20 - this.snake.length);
    this.snake.push(newSeg);

    this.spawnFood();
  }

  gameOver() {
    this.gameActive = false;
    this.sound.play('die', { volume: 0.7 });
    this.cameras.main.shake(300, 0.03);
    
    this.snake.forEach(seg => seg.setTint(0xff0000));
    
    setTimeout(() => {
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('pLogin').classList.add('hidden');
        document.getElementById('pRegister').classList.add('hidden');
        
        // Create custom game over panel if it doesn't exist
        let goPanel = document.getElementById('gameOverPanel');
        if (!goPanel) {
            goPanel = document.createElement('div');
            goPanel.id = 'gameOverPanel';
            goPanel.className = 'panel';
            document.getElementById('overlay').appendChild(goPanel);
        }
        goPanel.classList.remove('hidden');
        goPanel.innerHTML = `
            <div style="font-size:4rem;margin-bottom:10px;">💀</div>
            <h2 style="color:#ff5252">Game Over</h2>
            <p>Score: <strong style="color:#4caf50;font-size:1.5rem">${this.score}</strong></p>
            <p style="margin-bottom:20px;color:#aaa">Wings: ${this.wings} | Crowns: ${this.crowns}</p>
            <button class="btn-primary" onclick="startGameCustom()">Play Again</button>
            <button class="btn-secondary" onclick="window.location.href='/play-win'">Back to Arcade</button>
        `;
        
        API.save(this.score, this.wings, this.crowns);
    }, 1000);
  }
}

const config = {
  type: Phaser.AUTO,
  width: 600,
  height: 600,
  parent: 'game-container',
  scene: SnakeGame,
  antialias: true
};

let gameInstance = new Phaser.Game(config);

function startGameCustom() {
    document.getElementById('overlay').classList.add('hidden');
    const goPanel = document.getElementById('gameOverPanel');
    if (goPanel) goPanel.classList.add('hidden');
    if (gameInstance) gameInstance.scene.getAt(0).startGame();
}

// Restore session
const s = JSON.parse(localStorage.getItem('cw_session') || 'null');
if (s && s.token) {
  API.token = s.token; API.user = s.user;
  document.getElementById('overlay').classList.add('hidden');
}
</script>
</body>
</html>
